version: "3.8"

services:
  flay:
    build: .
    container_name: flay-app
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - flay-data:/app/data
      - flay-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SITE_URL=${SITE_URL:-http://localhost:4000}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - WAVE_PAYMENT_URL=${WAVE_PAYMENT_URL:-https://pay.wave.com}
      - WAVE_MERCHANT_NAME=${WAVE_MERCHANT_NAME:-DIGITALSTRATEGE BUSINESS}
      - WAVE_MERCHANT_PHONE=${WAVE_MERCHANT_PHONE:-+2250759731990}
      - WAVE_MERCHANT_EMAIL=${WAVE_MERCHANT_EMAIL:-contact@digitalstrateges.ci}
      - WHATSAPP_LINK=${WHATSAPP_LINK:-https://wa.me/2250759731990}
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  flay-data:
  flay-uploads:
