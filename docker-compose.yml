version: '3.8'
services:
  flay:
    build: .
    container_name: flay-app
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-too}
    volumes:
      - ./data:/app/data
    networks:
      - flay-net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: flay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - flay-net

  nginx:
    image: nginx:alpine
    container_name: flay-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - flay
    networks:
      - flay-net

networks:
  flay-net:
    driver: bridge
