<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#f77f00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Produit - Flay</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a1a;color:#e2e8f0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:1rem}
.card{background:#12121f;padding:2rem;border-radius:16px;max-width:480px;width:100%;text-align:center}
.card h1{color:#f77f00;margin-bottom:1rem;font-size:1.5rem}
.card p{color:#94a3b8;margin-bottom:1.5rem;line-height:1.6}
.card .btn{display:inline-block;padding:.75rem 2rem;background:#f77f00;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;transition:.2s}
.card .btn:hover{opacity:.9}
.card .btn-secondary{background:#1e293b;margin-left:.5rem}
@media(max-width:480px){.card{padding:1.5rem}.card .btn{display:block;margin:.5rem 0 0 0}}
</style>
<script defer>
const pid = new URLSearchParams(location.search).get('pid')
if (pid) {
  const token = localStorage.getItem('flay_token')
  if (token) {
    location.href = '/dashboard.html?page=product&id=' + pid
  } else {
    location.href = '/dashboard.html?page=product&id=' + pid
  }
}
</script>
</head>
<body>
<div class="card">
<h1>Produit</h1>
<p>Redirection vers le tableau de bord...</p>
<a href="/dashboard.html" class="btn">Accéder au tableau de bord</a>
<a href="/login.html" class="btn btn-secondary">Connexion</a>
</div>
</body>
</html>
