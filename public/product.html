<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Produit | Flay</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#080816">
    <link rel="icon" type="image/svg+xml" href="/logo-animated.svg">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#080816;--card:#111125;--card2:#1a1a33;--border:#1e1e38;--accent:#818cf8;--accent2:#a78bfa;--text:#f1f5f9;--muted:#64748b;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--radius:12px}
        body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        a{text-decoration:none;color:inherit}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes scaleIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

        .topbar{display:flex;align-items:center;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;gap:12px}
        .topbar-back{background:none;border:none;color:var(--text);cursor:pointer;font-size:20px;padding:4px 8px;border-radius:8px;transition:all .2s}
        .topbar-back:hover{background:var(--card2)}
        .topbar-brand{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

        .container{max-width:1000px;margin:0 auto;padding:16px}
        .layout{display:grid;grid-template-columns:1fr 1fr;gap:32px;animation:fadeUp .5s ease-out}
        @media(max-width:768px){.layout{grid-template-columns:1fr;gap:20px}}

        /* Gallery */
        .gallery{position:relative}
        .main-img{width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;background:var(--card);cursor:zoom-in;display:flex;align-items:center;justify-content:center}
        .main-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
        .main-img:hover img{transform:scale(1.05)}
        .thumbnails{display:flex;gap:8px;margin-top:12px;overflow-x:auto;padding-bottom:4px}
        .thumb{width:64px;height:64px;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0;background:var(--card)}
        .thumb.active{border-color:var(--accent)}
        .thumb img{width:100%;height:100%;object-fit:cover}

        /* Product info */
        .info{animation:fadeUp .6s ease-out}
        .breadcrumb{font-size:12px;color:var(--muted);margin-bottom:12px}
        .breadcrumb a:hover{color:var(--accent)}
        .product-name{font-size:24px;font-weight:800;margin-bottom:8px;line-height:1.2}
        .rating-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
        .stars{color:var(--warning);font-size:14px}
        .rating-count{font-size:13px;color:var(--muted)}
        .price-row{margin-bottom:16px}
        .price{font-size:28px;font-weight:800;color:var(--accent)}
        .compare{font-size:18px;color:var(--muted);text-decoration:line-through;margin-left:10px}
        .discount-badge{display:inline-block;padding:3px 10px;border-radius:6px;background:rgba(239,68,68,.15);color:var(--danger);font-size:12px;font-weight:700;margin-left:8px;vertical-align:middle}
        .stock{font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:6px}
        .stock.in{color:var(--success)}
        .stock.out{color:var(--danger)}
        .stock.low{color:var(--warning)}

        .variant-section{margin-bottom:16px}
        .variant-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
        .variant-options{display:flex;gap:8px;flex-wrap:wrap}
        .variant-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;font-family:inherit}
        .variant-btn:hover{border-color:var(--accent)}
        .variant-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

        .qty-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
        .qty-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase}
        .qty-controls{display:flex;align-items:center;gap:8px}
        .qty-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .qty-btn:hover{background:var(--card2);border-color:var(--accent)}
        .qty-val{font-size:16px;font-weight:700;min-width:24px;text-align:center}

        .actions{display:flex;gap:10px;margin-bottom:24px}
        .btn{flex:1;padding:14px 20px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
        .btn-primary{background:var(--accent);color:#fff}
        .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
        .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
        .btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
        .btn-secondary:hover{background:var(--card)}

        .description{margin-bottom:24px}
        .description h3{font-size:14px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
        .description p{font-size:14px;line-height:1.7;color:var(--text);opacity:.85;white-space:pre-wrap}
        .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
        .meta-item{font-size:12px;color:var(--muted)}
        .meta-item strong{color:var(--text)}

        /* Reviews */
        .reviews{margin-bottom:24px;animation:fadeUp .7s ease-out}
        .reviews h3{font-size:16px;font-weight:700;margin-bottom:12px}
        .review-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
        .review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .review-author{font-size:13px;font-weight:600}
        .review-date{font-size:11px;color:var(--muted)}
        .review-stars{color:var(--warning);font-size:12px;margin-bottom:4px}
        .review-comment{font-size:13px;opacity:.75;line-height:1.4}
        .review-form{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:12px}
        .review-form h4{font-size:14px;margin-bottom:10px}
        .review-form select,.review-form textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;margin-bottom:8px;outline:none}
        .review-form textarea{min-height:60px;resize:vertical}
        .review-form button{padding:10px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:13px}

        /* Related */
        .related{margin-top:32px;padding-top:24px;border-top:1px solid var(--border);animation:fadeUp .8s ease-out}
        .related h3{font-size:16px;font-weight:700;margin-bottom:16px}
        .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
        .related-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s}
        .related-card:hover{transform:translateY(-2px);border-color:var(--accent)}
        .related-card img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--card2)}
        .related-body{padding:10px}
        .related-name{font-size:13px;font-weight:600;margin-bottom:2px}
        .related-price{font-size:14px;font-weight:700;color:var(--accent)}

        /* Lightbox */
        .lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
        .lightbox.open{opacity:1;pointer-events:auto}
        .lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;transform:scale(.9);transition:transform .3s}
        .lightbox.open img{transform:scale(1)}

        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:14px;z-index:60;opacity:0;transition:all .3s;pointer-events:none;background:var(--card);border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.4)}
        .toast.show{opacity:1}

        .skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
        .skeleton-square{width:100%;aspect-ratio:1;border-radius:16px}
        .skeleton-line{height:16px;border-radius:6px;margin-bottom:10px}
        .skeleton-line:last-child{width:60%}
    </style>
</head>
<body>
    <div class="topbar">
        <button class="topbar-back" onclick="history.back()">&#8592;</button>
        <span class="topbar-brand">Flay</span>
    </div>

    <div class="container">
        <div class="layout" id="productLayout">
            <div class="gallery">
                <div class="main-img" id="mainImg" onclick="openLightbox()"><img src="" alt="" id="mainImgSrc"></div>
                <div class="thumbnails" id="thumbs"></div>
            </div>
            <div class="info">
                <div class="breadcrumb" id="breadcrumb"><a href="javascript:history.back()">Retour</a></div>
                <h1 class="product-name" id="pName">Chargement...</h1>
                <div class="rating-row" id="ratingRow" style="display:none">
                    <span class="stars" id="stars"></span>
                    <span class="rating-count" id="reviewCount"></span>
                </div>
                <div class="price-row" id="priceRow">
                    <span class="price" id="pPrice"></span>
                    <span class="compare" id="pCompare"></span>
                    <span class="discount-badge" id="pDiscount" style="display:none"></span>
                </div>
                <div class="stock" id="pStock"></div>
                <div class="variant-section" id="variantSection" style="display:none"></div>
                <div class="qty-row">
                    <span class="qty-label">Quantite</span>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty(-1)">-</button>
                        <span class="qty-val" id="qtyVal">1</span>
                        <button class="qty-btn" onclick="changeQty(1)">+</button>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" id="addToCartBtn" onclick="addToCart()">&#128722; Ajouter au panier</button>
                    <button class="btn btn-secondary" onclick="shareProduct()">&#128257;</button>
                </div>
                <div class="description" id="descSection" style="display:none">
                    <h3>Description</h3>
                    <p id="pDesc"></p>
                </div>
                <div class="meta" id="metaSection" style="display:none"></div>
            </div>
        </div>

        <div class="reviews" id="reviewsSection">
            <h3>&#9733; Avis clients</h3>
            <div id="reviewsList"></div>
            <div class="review-form" id="reviewForm" style="display:none">
                <h4>Donnez votre avis</h4>
                <select id="reviewRating"><option value="5">&#9733;&#9733;&#9733;&#9733;&#9733;</option><option value="4">&#9733;&#9733;&#9733;&#9733;</option><option value="3">&#9733;&#9733;&#9733;</option><option value="2">&#9733;&#9733;</option><option value="1">&#9733;</option></select>
                <textarea id="reviewComment" placeholder="Partagez votre experience..."></textarea>
                <button onclick="submitReview()">Publier</button>
            </div>
        </div>

        <div class="related" id="relatedSection" style="display:none">
            <h3>Produits similaires</h3>
            <div class="related-grid" id="relatedGrid"></div>
        </div>

        <div class="related" id="suggestionsSection" style="display:none">
            <h3>Suggestions</h3>
            <div class="related-grid" id="suggestionsGrid"></div>
        </div>
    </div>

    <div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
        <img src="" alt="" id="lightboxImg">
    </div>
    <div class="toast" id="toast"></div>
    <div class="share-modal" id="shareModal" onclick="this.style.display='none'">
        <div class="share-modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:16px">&#128257; Partager ce produit</h3>
            <div class="share-btns">
                <button onclick="shareSocial(‘whatsapp')" style="background:#25D366">&#128172; WhatsApp</button>
                <button onclick="shareSocial(‘facebook')" style="background:#1877F2">f Facebook</button>
                <button onclick="shareSocial(‘twitter')" style="background:#000">X Twitter</button>
                <button onclick="shareSocial(‘telegram')" style="background:#0088CC">&#9992; Telegram</button>
                <button onclick="shareSocial(‘pinterest')" style="background:#BD081C">&#128204; Pinterest</button>
            </div>
            <div class="share-link-copy">
                <input type="text" id="shareLinkInput" readonly style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:14px;margin-top:12px">
                <button onclick="copyShareLink()" style="margin-top:8px;width:100%;padding:10px;border:1px solid var(--accent);border-radius:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer">&#128203; Copier le lien</button>
            </div>
        </div>
    </div>
    <style>
        .share-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
        .share-modal-content{background:var(--card);border-radius:16px;padding:24px;width:90%;max-width:360px;border:1px solid var(--border)}
        .share-modal h3{font-size:16px;font-weight:700}
        .share-btns{display:flex;flex-direction:column;gap:8px}
        .share-btns button{color:#fff;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s;display:flex;align-items:center;gap:8px}
        .share-btns button:hover{transform:scale(1.02)}
    </style>

    <script>
        function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
        let product=null, qty=1, currentImg=0, images=[];

        function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

        function getProductId(){return window.location.pathname.split('/product/')[1]||''}

        async function loadProduct(){
            const pid=getProductId();
            if(!pid)return;
            try{
                const r=await fetch('/api/products/public/'+pid);
                if(!r.ok)throw new Error('not found');
                const d=await r.json();
                product=d.product;
                if(!product)throw new Error('no product');
                images=typeof product.images==='string'?JSON.parse(product.images):(product.images||[]);
                renderProduct();
                loadReviews();
            }catch(e){
                document.getElementById('productLayout').innerHTML='<div style="text-align:center;padding:80px 20px"><h2 style="color:var(--danger)">Produit introuvable</h2></div>';
            }
        }

        function renderProduct(){
            document.title=product.name+' | Flay';

            // Images
            const imgs=images.length?images:[product.thumbnail||''];
            document.getElementById('mainImgSrc').src=imgs[0]||'/placeholder.png';
            document.getElementById('mainImgSrc').alt=product.name;
            if(imgs.length>1){
                document.getElementById('thumbs').innerHTML=imgs.map((url,i)=>'<div class="thumb'+(i===0?' active':'')+'" onclick="switchImage('+i+')"><img src="'+esc(url)+'" alt=""></div>').join('');
            }

            // Name
            document.getElementById('pName').textContent=product.name;

            // Rating
            const stats=typeof product.stats==='string'?JSON.parse(product.stats):(product.stats||{});
            const rating=stats.rating||0;
            const reviewCount=stats.reviewCount||0;
            if(reviewCount>0){
                document.getElementById('ratingRow').style.display='flex';
                document.getElementById('stars').textContent='&#9733;'.repeat(Math.round(rating))+'&#9734;'.repeat(5-Math.round(rating));
                document.getElementById('reviewCount').textContent=rating.toFixed(1)+' ('+reviewCount+' avis)';
            }

            // Price
            document.getElementById('pPrice').textContent=Number(product.price).toLocaleString()+' '+(product.currency||'XOF');
            if(product.comparePrice>product.price){
                document.getElementById('pCompare').textContent=Number(product.comparePrice).toLocaleString()+' '+(product.currency||'XOF');
                const disc=Math.round((1-product.price/product.comparePrice)*100);
                const d=document.getElementById('pDiscount');
                d.textContent='-'+disc+'%';d.style.display='inline-block';
            }

            // Stock
            const s=document.getElementById('pStock');
            if(product.trackInventory){
                if(product.stock>10)s.innerHTML='<span class="stock in">&#10003; En stock ('+product.stock+')</span>';
                else if(product.stock>0)s.innerHTML='<span class="stock low">&#9888; Plus que '+product.stock+' en stock</span>';
                else s.innerHTML='<span class="stock out">&#10007; Rupture de stock</span>';
            }else s.innerHTML='<span class="stock in">&#10003; Disponible</span>';

            // Variants
            const opts=typeof product.options==='string'?JSON.parse(product.options):(product.options||[]);
            if(opts.length){
                const vs=document.getElementById('variantSection');
                vs.style.display='block';
                vs.innerHTML=opts.map(o=>'<div class="variant-label">'+esc(o.name)+'</div><div class="variant-options">'+o.values.map((v,i)=>'<button class="variant-btn'+(i===0?' active':'')+'" onclick="selectVariant(this,\''+esc(o.name)+'\')">'+esc(v)+'</button>').join('')+'</div>').join('');
            }

            // Description
            if(product.description){
                document.getElementById('descSection').style.display='block';
                document.getElementById('pDesc').textContent=product.description;
            }

            // Meta
            const meta=[];
            if(product.sku)meta.push('<div class="meta-item"><strong>SKU</strong><br>'+product.sku+'</div>');
            if(product.category)meta.push('<div class="meta-item"><strong>Categorie</strong><br>'+product.category+'</div>');
            if(product.weight)meta.push('<div class="meta-item"><strong>Poids</strong><br>'+product.weight+'g</div>');
            if(meta.length){document.getElementById('metaSection').style.display='grid';document.getElementById('metaSection').innerHTML=meta.join('')}

            // Add to cart button state
            if(product.trackInventory&&product.stock<=0)document.getElementById('addToCartBtn').disabled=true;
        }

        function switchImage(i){
            currentImg=i;
            document.getElementById('mainImgSrc').src=images[i];
            document.querySelectorAll('.thumb').forEach((t,idx)=>t.classList.toggle('active',idx===i));
        }

        function openLightbox(){
            if(!images[currentImg])return;
            document.getElementById('lightboxImg').src=images[currentImg];
            document.getElementById('lightbox').classList.add('open');
        }

        function selectVariant(el){
            el.parentElement.querySelectorAll('.variant-btn').forEach(b=>b.classList.remove('active'));
            el.classList.add('active');
        }

        function changeQty(delta){
            qty=Math.max(1,Math.min(qty+delta,product.stock||99));
            document.getElementById('qtyVal').textContent=qty;
        }

        async function addToCart(){
            const token=localStorage.getItem('flay_token');
            if(!token){showToast('Connectez-vous pour ajouter au panier');return}
            try{
                const r=await fetch('/api/cart/add',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({productId:product.id,quantity:qty})});
                if(r.ok){showToast('&#10003; Ajoute au panier');document.getElementById('addToCartBtn').textContent='&#10003; Ajoute !';setTimeout(()=>document.getElementById('addToCartBtn').innerHTML='&#128722; Ajouter au panier',2000)}
                else showToast('Erreur');
            }catch(e){showToast('Erreur')}
        }

        function shareProduct(){
            const url=window.location.href,t=product.name;
            document.getElementById('shareLinkInput').value=url;
            if(navigator.share)navigator.share({title:t,url}).catch(()=>{});
            else{
                const m=document.getElementById('shareModal');
                if(m){m.style.display='flex';return}
                showToast('&#128279; Lien copie !')
            }
        }
        function shareSocial(p){
            const url=encodeURIComponent(window.location.href),t=encodeURIComponent(product.name);
            const links={whatsapp:'https://wa.me/?text='+t+'%20'+url,facebook:'https://www.facebook.com/sharer/sharer.php?u='+url,twitter:'https://twitter.com/intent/tweet?text='+t+'&url='+url,telegram:'https://t.me/share/url?url='+url+'&text='+t,pinterest:'https://pinterest.com/pin/create/button/?url='+url+'&description='+t};
            if(links[p])window.open(links[p],'_blank','width=600,height=400');
        }
        function copyShareLink(){navigator.clipboard.writeText(window.location.href);showToast('&#128279; Lien copie !');document.getElementById('shareModal').style.display='none'}

        async function loadReviews(){
            try{
                const r=await fetch('/api/products/'+product.id+'/reviews');
                if(!r.ok)return;
                const d=await r.json();
                const list=document.getElementById('reviewsList');
                if(d.reviews&&d.reviews.length){
                    list.innerHTML=d.reviews.map(rv=>'<div class="review-card"><div class="review-header"><span class="review-author">'+esc(rv.userName||'Anonyme')+'</span><span class="review-date">'+new Date(rv.createdAt).toLocaleDateString()+'</span></div><div class="review-stars">'+'&#9733;'.repeat(rv.rating)+'&#9734;'.repeat(5-rv.rating)+'</div>'+(rv.comment?'<div class="review-comment">'+esc(rv.comment)+'</div>':'')+'</div>').join('');
                }else list.innerHTML='<p style="color:var(--muted);font-size:14px">Aucun avis pour le moment</p>';

                const token=localStorage.getItem('flay_token');
                if(token)document.getElementById('reviewForm').style.display='block';
            }catch(e){}
            loadRelated();
        }

        async function submitReview(){
            const token=localStorage.getItem('flay_token');
            if(!token){showToast('Connectez-vous pour donner un avis');return}
            const rating=document.getElementById('reviewRating').value;
            const comment=document.getElementById('reviewComment').value;
            try{
                const r=await fetch('/api/products/'+product.id+'/reviews',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({rating:parseInt(rating),comment})});
                if(r.ok){showToast('&#10003; Avis publie !');document.getElementById('reviewComment').value='';loadReviews()}
                else showToast('Erreur');
            }catch(e){showToast('Erreur')}
        }

        async function loadRelated(){
            try{
                const userId=product.userId;
                const r=await fetch('/api/products/'+userId+'?page=1&limit=4');
                const d=await r.json();
                const items=d.products||d.items||[];
                const others=items.filter(p=>p.id!==product.id).slice(0,4);
                if(others.length){
                    document.getElementById('relatedSection').style.display='block';
                    document.getElementById('relatedGrid').innerHTML=others.map(p=>'<div class="related-card" onclick="window.location=\'/product/'+esc(p.id)+'\'"><img src="'+(p.thumbnail||'')+'" alt="'+esc(p.name)+'"><div class="related-body"><div class="related-name">'+esc(p.name)+'</div><div class="related-price">'+Number(p.price).toLocaleString()+'</div></div></div>').join('');
                }
            }catch(e){}
            loadSuggestions();
        }

        async function loadSuggestions(){
            try{
                const pid=getProductId();
                const token=localStorage.getItem('flay_token');
                let url='/api/products/recommendations/'+pid+'?limit=6';
                if(token){
                    try{
                        const u=JSON.parse(localStorage.getItem('flay_user')||'{}');
                        if(u.id)url+='&userId='+u.id;
                    }catch(e){}
                }
                const r=await fetch(url);
                const d=await r.json();
                const items=d.recommendations||[];
                const filtered=items.filter(p=>p.id!==pid).slice(0,6);
                if(filtered.length){
                    document.getElementById('suggestionsSection').style.display='block';
                    document.getElementById('suggestionsGrid').innerHTML=filtered.map(p=>'<div class="related-card" onclick="window.location=\'/product/'+esc(p.id)+'\'"><img src="'+(p.thumbnail||'')+'" alt="'+esc(p.name)+'"><div class="related-body"><div class="related-name">'+esc(p.name)+'</div><div class="related-price">'+Number(p.price).toLocaleString()+'</div></div></div>').join('');
                }
            }catch(e){}
        }

        loadProduct();
    </script>
</body>
</html>
