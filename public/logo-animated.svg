<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#818cf8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Icon box -->
  <rect x="8" y="10" width="100" height="100" rx="24" fill="url(#grad)" filter="url(#shadow)"/>

  <!-- Letter F - modern geometric -->
  <g transform="translate(44, 28)">
    <rect x="0" y="0" width="20" height="64" rx="6" fill="white" opacity="0.95"/>
    <rect x="0" y="0" width="52" height="16" rx="6" fill="white" opacity="0.95"/>
    <rect x="0" y="24" width="40" height="14" rx="5" fill="white" opacity="0.95"/>
  </g>

  <!-- Decorative dot -->
  <circle cx="98" cy="22" r="4" fill="#a78bfa" opacity="0.8"/>

  <!-- Text "Flay" -->
  <text x="130" y="76" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="52" fill="url(#gradText)" filter="url(#glow)" letter-spacing="1">Flay</text>

  <!-- Tagline -->
  <text x="132" y="100" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#64748b" letter-spacing="2">PLATEFORME TOUT-EN-UN</text>

  <!-- Accent line -->
  <rect x="130" y="106" width="60" height="2" rx="1" fill="url(#gradAccent)" opacity="0.6"/>
</svg>
