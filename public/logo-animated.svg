<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#818cf8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad)" opacity="0.1"/>
  <circle cx="100" cy="100" r="80" fill="url(#grad)" opacity="0.05"/>
  
  <!-- Main letter F - modern geometric -->
  <g transform="translate(50, 35)" filter="url(#shadow)">
    <!-- F stem -->
    <rect x="10" y="0" width="14" height="100" rx="4" fill="url(#grad2)"/>
    <!-- F top bar -->
    <rect x="10" y="0" width="70" height="14" rx="4" fill="url(#grad2)"/>
    <!-- F middle bar -->
    <rect x="10" y="38" width="55" height="12" rx="3" fill="url(#grad2)"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="145" cy="55" r="5" fill="#818cf8" opacity="0.6" filter="url(#glow)"/>
  <circle cx="155" cy="75" r="3" fill="#a78bfa" opacity="0.4"/>
  <circle cx="140" cy="85" r="4" fill="#6366f1" opacity="0.5"/>
  
  <!-- Signal waves (connectivity) -->
  <g opacity="0.3" fill="none" stroke="#818cf8" stroke-width="1.5">
    <path d="M 140 110 Q 155 100 140 90" stroke-linecap="round"/>
    <path d="M 148 115 Q 170 100 148 85" stroke-linecap="round"/>
    <path d="M 156 120 Q 185 100 156 80" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="40" y="160" width="120" height="3" rx="1.5" fill="url(#grad)" opacity="0.4"/>
</svg>
