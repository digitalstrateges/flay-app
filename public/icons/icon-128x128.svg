<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:.15"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#818cf8" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)" filter="url(#shadow)"/>
  <rect width="192" height="192" rx="40" fill="url(#shine)"/>
  <g transform="translate(76, 44)">
    <rect x="0" y="0" width="18" height="104" rx="6" fill="white" opacity=".95"/>
    <rect x="0" y="0" width="52" height="20" rx="6" fill="white" opacity=".95"/>
    <rect x="0" y="38" width="40" height="16" rx="5" fill="white" opacity=".95"/>
  </g>
</svg>
