<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nouveau mot de passe</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}body.light{--bg:#f8f9fa;--text:#111;--card:#fff;--border:#e2e8f0;--muted:#64748b;--primary:#6366f1}body.dark{--bg:#0f0f1a;--text:#e2e8f0;--card:#1a1a2e;--border:#2a2a3e;--muted:#94a3b8;--primary:#818cf8}body.midnight{--bg:#0a0a1a;--text:#e2e8f0;--card:#111122;--border:#1e1e33;--muted:#64748b;--primary:#60a5fa}.auth-container{width:100%;max-width:440px;padding:20px}.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.15)}.logo{text-align:center;margin-bottom:30px}.logo svg{width:56px;height:56px}.logo h1{font-size:28px;margin-top:12px;background:linear-gradient(135deg,var(--primary),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.subtitle{color:var(--muted);font-size:14px;margin-top:6px;text-align:center}.form-group{margin-bottom:20px}.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--muted)}.input-group{position:relative}.input-group input{width:100%;padding:12px 16px 12px 44px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;transition:.2s}.input-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15);outline:none}.input-group .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}.password-strength{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}.password-strength .bar{height:100%;width:0%;border-radius:2px;transition:.3s}.password-strength .bar.weak{width:33%;background:#ef4444}.password-strength .bar.medium{width:66%;background:#f59e0b}.password-strength .bar.strong{width:100%;background:#10b981}.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.35)}.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}.alert{padding:12px 16px;border-radius:10px;margin-bottom:20px;font-size:13px;display:none}.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;display:block}.alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#10b981;display:block}.links{text-align:center;margin-top:24px;font-size:13px;color:var(--muted)}.links a{color:var(--primary);text-decoration:none;font-weight:600}.back-btn{position:absolute;top:20px;left:20px;background:none;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px}.back-btn:hover{color:var(--text)}.success-box{text-align:center;padding:30px 0}.success-box svg{margin-bottom:16px;color:#10b981}.success-box h2{font-size:20px;margin-bottom:8px}.success-box p{color:var(--muted);font-size:14px;margin-bottom:24px}.invalid-token{text-align:center;padding:40px 0}.invalid-token svg{color:#ef4444;margin-bottom:16px}</style></head><body class="dark"><div class="auth-container"><div class="auth-card" style="position:relative"><a href="/login.html" class="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Retour</a><div class="logo"><svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="#6366f1"/><path d="M14 24h20M28 18l6 6-6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg><h1>Flay</h1><p class="subtitle">Nouveau mot de passe</p></div><div id="invalid-section" style="display:none"><div class="invalid-token"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><h2>Lien invalide</h2><p style="color:var(--muted)">Ce lien de reinitialisation a expire ou est invalide.</p><div class="links"><a href="/forgot-password.html">Demander un nouveau lien</a></div></div></div><div id="form-section"><div id="alert" class="alert"></div><form id="resetForm"><div class="form-group"><label>Nouveau mot de passe</label><div class="input-group"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span><input type="password" id="password" placeholder="8 caracteres minimum" required minlength="8"><div class="password-strength"><div class="bar" id="strengthBar"></div></div></div></div><div class="form-group"><label>Confirmer</label><div class="input-group"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span><input type="password" id="confirm" placeholder="Confirmer le mot de passe" required></div></div><button type="submit" class="btn btn-primary" id="submitBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Reinitialiser</button></form></div><div id="success-section" style="display:none"><div class="success-box"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg><h2>Mot de passe modifie !</h2><p>Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</p><a href="/login.html" class="btn btn-primary" style="text-decoration:none">Se connecter</a></div></div></div></div><script>const params=new URLSearchParams(window.location.search);const token=params.get('token');if(!token){document.getElementById('form-section').style.display='none';document.getElementById('invalid-section').style.display='block'}document.getElementById('password').addEventListener('input',e=>{const v=e.target.value;const bar=document.getElementById('strengthBar');if(v.length<6){bar.className='bar';return}let s=0;if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;bar.className='bar '+(s<=1?'weak':s<=2?'medium':'strong')});document.getElementById('resetForm').addEventListener('submit',async e=>{e.preventDefault();const password=document.getElementById('password').value;const confirm=document.getElementById('confirm').value;const alert=document.getElementById('alert');if(password!==confirm){alert.className='alert alert-error';alert.textContent='Les mots de passe ne correspondent pas';return}if(password.length<8){alert.className='alert alert-error';alert.textContent='8 caracteres minimum requis';return}const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='Reinitialisation...';try{const r=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,newPassword:password})});const d=await r.json();if(d.message){alert.className='alert alert-success';alert.textContent='Mot de passe reinitialise !';setTimeout(()=>{document.getElementById('form-section').style.display='none';document.getElementById('success-section').style.display='block'},1000)}else{alert.className='alert alert-error';alert.textContent=d.error||'Erreur lors de la reinitialisation';btn.disabled=false;btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Reinitialiser'}}catch(e){alert.className='alert alert-error';alert.textContent='Erreur reseau';btn.disabled=false;btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Reinitialiser'}});</script></body></html>
