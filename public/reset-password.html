<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Réinitialiser mot de passe | Flay</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a1a">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a1a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#12121f;border-radius:16px;padding:2.5rem;width:100%;max-width:400px;border:1px solid #1e293b}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#818cf8,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
h2{font-size:1.15rem;margin-bottom:.25rem;color:#f1f5f9}
p{color:#64748b;font-size:.85rem;margin-bottom:1.5rem}
.form-group{margin-bottom:1rem}
label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:.35rem;font-weight:500}
input{width:100%;padding:.75rem 1rem;background:rgba(255,255,255,.05);border:1px solid #1e293b;border-radius:10px;color:#e2e8f0;font-size:1rem;outline:none;transition:border .2s}
input:focus{border-color:#818cf8}
.btn{width:100%;padding:.75rem;border-radius:10px;border:none;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary{background:#6366f1;color:#fff}
.btn-primary:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.footer{text-align:center;margin-top:1.25rem;font-size:.82rem;color:#64748b}
.footer a{color:#818cf8;text-decoration:none}
.msg{text-align:center;font-size:.85rem;margin-top:.75rem;display:none}
.msg.error{color:#f87171}
.msg.success{color:#10b981}
.pw-hint{font-size:.75rem;color:#64748b;margin-top:.25rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><h1>Flay</h1></div>
  <h2>Nouveau mot de passe</h2>
  <p>Choisissez un mot de passe sécurisé</p>
  <div id="form">
    <div class="form-group">
      <label>Nouveau mot de passe</label>
      <input type="password" id="password" placeholder="8 caractères min, 1 majuscule, 1 chiffre" autocomplete="new-password">
      <div class="pw-hint">8 caractères minimum, 1 majuscule, 1 chiffre</div>
    </div>
    <button class="btn btn-primary" id="submitBtn" onclick="resetPassword()">Réinitialiser</button>
    <div id="msg" class="msg"></div>
  </div>
  <div class="footer">
    <a href="/login.html">Retour à la connexion</a>
  </div>
</div>
<script>
function getToken() {
  const params = new URLSearchParams(window.location.search);
  return params.get('token');
}

function resetPassword() {
  const password = document.getElementById('password').value;
  const token = getToken();
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');

  if (!token) {
    msg.textContent = 'Token manquant. Utilisez le lien complet depuis votre email.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }

  if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
    msg.textContent = '8 caractères min, 1 majuscule, 1 chiffre';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'En cours...';
  msg.style.display = 'none';

  fetch('/api/auth/reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, password })
  }).then(r => r.json()).then(data => {
    if (data.error) {
      msg.textContent = data.error;
      msg.className = 'msg error';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Réinitialiser';
      return;
    }
    msg.textContent = 'Mot de passe réinitialisé ! Redirection...';
    msg.className = 'msg success';
    msg.style.display = 'block';
    setTimeout(() => window.location = '/login.html', 2000);
  }).catch(() => {
    msg.textContent = 'Erreur de connexion';
    msg.className = 'msg error';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Réinitialiser';
  });
}

if (!getToken()) {
  document.getElementById('msg').textContent = 'Token manquant. Veuillez utiliser le lien complet depuis votre email.';
  document.getElementById('msg').className = 'msg error';
  document.getElementById('msg').style.display = 'block';
  document.getElementById('submitBtn').disabled = true;
}
</script>
</body>
</html>
