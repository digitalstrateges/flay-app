<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Réinitialiser mot de passe | Flay</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f77f00">
<style>
:root{--bg:#0f0a05;--card:#2a2010;--border:#4a3820;--accent:#f77f00;--accent2:#e07000;--text:#f0e6d0;--text2:#b8a880;--muted:#8a7a60;--gradient:linear-gradient(135deg,#f77f00,#ff9f30)}
.light{--bg:#faf6f0;--card:#ffffff;--border:#e0d5c5;--accent:#e07000;--accent2:#f77f00;--text:#1a150a;--text2:#6b5c45;--muted:#8a7a60;--gradient:linear-gradient(135deg,#e07000,#f77f00)}
@media(prefers-color-scheme:light){:root{--bg:#faf6f0;--card:#ffffff;--border:#e0d5c5;--accent:#e07000;--accent2:#f77f00;--text:#1a150a;--text2:#6b5c45;--muted:#8a7a60;--gradient:linear-gradient(135deg,#e07000,#f77f00)}.light{--bg:#0f0a05;--card:#2a2010;--border:#4a3820;--accent:#f77f00;--accent2:#e07000;--text:#f0e6d0;--text2:#b8a880;--muted:#8a7a60;--gradient:linear-gradient(135deg,#f77f00,#ff9f30)}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:var(--card);border-radius:16px;padding:40px 32px;width:100%;max-width:400px;border:1px solid var(--border)}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:24px;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
h2{font-size:18px;margin-bottom:4px;color:var(--text)}
p{color:var(--text2);font-size:14px;margin-bottom:24px;line-height:1.5}
.form-group{margin-bottom:16px}
label{display:block;font-size:14px;color:var(--text2);margin-bottom:6px;font-weight:500}
input{width:100%;padding:14px 16px;min-height:48px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;outline:none;transition:border .2s}
input:focus{border-color:var(--accent)}
.btn{width:100%;padding:14px;min-height:48px;border-radius:10px;border:none;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn-primary{background:var(--gradient);color:#fff}
.btn-primary:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.footer{text-align:center;margin-top:20px;font-size:14px;color:var(--muted)}
.footer a{color:var(--accent);text-decoration:none;display:inline-block;padding:8px 4px}
.msg{text-align:center;font-size:14px;margin-top:12px;display:none;line-height:1.5}
.msg.error{color:#f87171}
.msg.success{color:#22c55e}
.pw-hint{font-size:13px;color:var(--muted);margin-top:6px}
@media(hover:none){.btn-primary:hover{opacity:1}.btn-primary:active{transform:scale(.97)}}
@media(max-width:480px){
.card{padding:28px 20px;border-radius:14px}
.logo h1{font-size:20px}
h2{font-size:16px}
input{padding:12px 14px;font-size:15px}
.btn{font-size:15px}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><h1>Flay</h1></div>
  <h2>Nouveau mot de passe</h2>
  <p>Choisissez un mot de passe sécurisé</p>
  <div id="form">
    <div class="form-group">
      <label>Nouveau mot de passe</label>
      <input type="password" id="password" placeholder="8 caractères min, 1 majuscule, 1 chiffre" autocomplete="new-password">
      <div class="pw-hint">8 caractères minimum, 1 majuscule, 1 chiffre</div>
    </div>
    <button class="btn btn-primary" id="submitBtn" onclick="resetPassword()">Réinitialiser</button>
    <div id="msg" class="msg"></div>
  </div>
  <div class="footer">
    <a href="/login.html">Retour à la connexion</a>
  </div>
</div>
<script>
function getToken() {
  const params = new URLSearchParams(window.location.search);
  return params.get('token');
}
function resetPassword() {
  const password = document.getElementById('password').value;
  const token = getToken();
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  if (!token) {
    msg.textContent = 'Token manquant. Utilisez le lien complet depuis votre email.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }
  if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
    msg.textContent = '8 caractères min, 1 majuscule, 1 chiffre';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'En cours...';
  msg.style.display = 'none';
  fetch('/api/auth/reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, password })
  }).then(r => r.json()).then(data => {
    if (data.error) {
      msg.textContent = data.error;
      msg.className = 'msg error';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Réinitialiser';
      return;
    }
    msg.textContent = 'Mot de passe réinitialisé ! Redirection...';
    msg.className = 'msg success';
    msg.style.display = 'block';
    setTimeout(() => window.location = '/login.html', 2000);
  }).catch(() => {
    msg.textContent = 'Erreur de connexion';
    msg.className = 'msg error';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Réinitialiser';
  });
}
if (!getToken()) {
  document.getElementById('msg').textContent = 'Token manquant. Veuillez utiliser le lien complet depuis votre email.';
  document.getElementById('msg').className = 'msg error';
  document.getElementById('msg').style.display = 'block';
  document.getElementById('submitBtn').disabled = true;
}
</script>
</body>
</html>
