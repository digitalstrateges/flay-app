<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mot de passe oublie</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}body.light{--bg:#f8f9fa;--text:#111;--card:#fff;--border:#e2e8f0;--muted:#64748b;--primary:#6366f1}body.dark{--bg:#0f0f1a;--text:#e2e8f0;--card:#1a1a2e;--border:#2a2a3e;--muted:#94a3b8;--primary:#818cf8}body.midnight{--bg:#0a0a1a;--text:#e2e8f0;--card:#111122;--border:#1e1e33;--muted:#64748b;--primary:#60a5fa}body.ocean{--bg:#0a1628;--text:#e2e8f0;--card:#0f2035;--border:#1a3a5c;--muted:#64748b;--primary:#06b6d4}body.emerald{--bg:#0a1a1a;--text:#e2e8f0;--card:#0f2525;--border:#1a3535;--muted:#64748b;--primary:#10b981}.auth-container{width:100%;max-width:440px;padding:20px}.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.15)}.logo{text-align:center;margin-bottom:30px}.logo svg{width:56px;height:56px}.logo h1{font-size:28px;margin-top:12px;background:linear-gradient(135deg,var(--primary),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.subtitle{color:var(--muted);font-size:14px;margin-top:6px;text-align:center}.form-group{margin-bottom:20px}.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--muted)}.input-group{position:relative}.input-group input{width:100%;padding:12px 16px 12px 44px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;transition:.2s}.input-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15);outline:none}.input-group .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.35)}.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}.btn-secondary{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);margin-top:12px}.btn-secondary:hover{background:rgba(255,255,255,.1)}.alert{padding:12px 16px;border-radius:10px;margin-bottom:20px;font-size:13px;display:none}.alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#10b981;display:block}.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;display:block}.links{text-align:center;margin-top:24px;font-size:13px;color:var(--muted)}.links a{color:var(--primary);text-decoration:none;font-weight:600}.links a:hover{text-decoration:underline}.back-btn{position:absolute;top:20px;left:20px;background:none;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px}.back-btn:hover{color:var(--text)}.success-box{text-align:center;padding:30px 0}.success-box svg{margin-bottom:16px;color:#10b981}.success-box h2{font-size:20px;margin-bottom:8px}.success-box p{color:var(--muted);font-size:14px;margin-bottom:24px}</style>    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flay">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg">
    <link rel="icon" type="image/svg+xml" href="/logo-animated.svg">
    <script src="/pwa.js"></script>
</head><body class="dark"><div class="auth-container"><div class="auth-card" style="position:relative"><a href="/login.html" class="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Retour</a><div class="logo"><svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="#6366f1"/><path d="M14 24h20M28 18l6 6-6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg><h1>Flay</h1><p class="subtitle">Mot de passe oublie</p></div><div id="form-section"><div id="alert" class="alert"></div><form id="forgotForm"><div class="form-group"><label>Email</label><div class="input-group"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 4-10 8L2 4"/></svg></span><input type="email" id="email" placeholder="votre@email.com" required></div></div><button type="submit" class="btn btn-primary" id="submitBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Envoyer le lien</button></form></div><div id="success-section" style="display:none"><div class="success-box"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg><h2>Email envoye !</h2><p>Verifiez votre boite de reception pour reinitialiser votre mot de passe.</p><button class="btn btn-primary" onclick="showForm()">Renvoyer</button><div class="links" style="margin-top:16px"><a href="/login.html">Retour a la connexion</a></div></div></div></div></div><script>const params=new URLSearchParams(window.location.search);if(params.get('email'))document.getElementById('email').value=params.get('email');function showForm(){document.getElementById('form-section').style.display='block';document.getElementById('success-section').style.display='none';document.getElementById('alert').className='alert';document.getElementById('alert').textContent=''}document.getElementById('forgotForm').addEventListener('submit',async e=>{e.preventDefault();const email=document.getElementById('email').value.trim();const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='Envoi en cours...';const alert=document.getElementById('alert');try{const r=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});const d=await r.json();if(d.link||d.resetUrl){alert.className='alert alert-success';alert.textContent='Lien de reinitialisation envoye !';setTimeout(()=>{document.getElementById('form-section').style.display='none';document.getElementById('success-section').style.display='block'},1000)}else{alert.className='alert alert-error';alert.textContent=d.error||'Email non trouve';btn.disabled=false;btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Envoyer le lien'}}catch(e){alert.className='alert alert-error';alert.textContent='Erreur reseau';btn.disabled=false;btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Envoyer le lien'}});</script></body></html>
