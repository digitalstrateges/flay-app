<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mot de passe oublié | Flay</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a1a">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a1a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#12121f;border-radius:16px;padding:2.5rem;width:100%;max-width:400px;border:1px solid #1e293b}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#818cf8,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
h2{font-size:1.15rem;margin-bottom:.25rem;color:#f1f5f9}
p{color:#64748b;font-size:.85rem;margin-bottom:1.5rem}
.form-group{margin-bottom:1rem}
label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:.35rem;font-weight:500}
input{width:100%;padding:.75rem 1rem;background:rgba(255,255,255,.05);border:1px solid #1e293b;border-radius:10px;color:#e2e8f0;font-size:1rem;outline:none;transition:border .2s}
input:focus{border-color:#818cf8}
.btn{width:100%;padding:.75rem;border-radius:10px;border:none;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary{background:#6366f1;color:#fff}
.btn-primary:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.footer{text-align:center;margin-top:1.25rem;font-size:.82rem;color:#64748b}
.footer a{color:#818cf8;text-decoration:none}
.success{display:none;text-align:center;padding:1.5rem}
.success-icon{font-size:3rem;margin-bottom:.75rem}
.msg{text-align:center;font-size:.85rem;margin-top:.75rem;display:none}
.msg.error{color:#f87171}
.msg.success{color:#10b981}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><h1>Flay</h1></div>
  <h2>Mot de passe oublié</h2>
  <p>Saisissez votre email pour recevoir un lien de réinitialisation</p>
  <div id="form">
    <div class="form-group">
      <label>Adresse email</label>
      <input type="email" id="email" placeholder="vous@exemple.com" autocomplete="email">
    </div>
    <button class="btn btn-primary" id="submitBtn" onclick="sendReset()">Envoyer le lien</button>
    <div id="msg" class="msg"></div>
  </div>
  <div class="success" id="success">
    <div class="success-icon">&#9989;</div>
    <h3 style="color:#10b981;margin-bottom:.35rem">Email envoyé</h3>
    <p style="color:#94a3b8;font-size:.85rem">Si un compte existe avec cet email, vous recevrez un lien de réinitialisation sous peu.</p>
  </div>
  <div class="footer">
    <a href="/login.html">Retour à la connexion</a>
  </div>
</div>
<script>
function sendReset() {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    msg.textContent = 'Email invalide';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Envoi...';
  msg.style.display = 'none';
  fetch('/api/auth/forgot-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  }).then(r => r.json()).then(data => {
    document.getElementById('form').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  }).catch(() => {
    msg.textContent = 'Erreur de connexion';
    msg.className = 'msg error';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Envoyer le lien';
  });
}
</script>
</body>
</html>
