<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boutique | Flay</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a1a">
    <link rel="icon" type="image/svg+xml" href="/logo-animated.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#080816;--card:#111125;--card2:#1a1a33;--border:#1e1e38;--accent:#818cf8;--accent2:#a78bfa;--text:#f1f5f9;--muted:#64748b;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.3)}
        body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        a{text-decoration:none;color:inherit}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

        .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30}
        .topbar-brand{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .topbar-actions{display:flex;align-items:center;gap:12px}
        .topbar-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;border-radius:8px;transition:all .2s;position:relative;font-size:20px}
        .topbar-btn:hover{background:var(--card2)}
        .cart-badge{position:absolute;top:0;right:0;background:var(--accent);color:#fff;font-size:10px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}

        .container{max-width:1200px;margin:0 auto;padding:0 16px}

        /* Store header */
        .store-header{padding:32px 16px 24px;text-align:center;animation:fadeUp .5s ease-out}
        .store-map{max-height:200px;border-radius:12px;overflow:hidden;margin:0 0 16px;border:1px solid var(--border);animation:fadeUp .55s ease-out;display:none}
        .store-map #storeProfileMap{height:200px;z-index:1}
        .store-map .map-addr{font-size:12px;color:var(--muted);padding:8px 12px;text-align:center;background:var(--card)}
        .store-logo{width:72px;height:72px;border-radius:16px;background:var(--card);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;border:1px solid var(--border)}
        .store-name{font-size:26px;font-weight:800;margin-bottom:6px}
        .store-desc{color:var(--muted);font-size:14px;max-width:500px;margin:0 auto;line-height:1.5}

        /* Search + Filters */
        .toolbar{display:flex;gap:12px;align-items:center;padding:8px 0 16px;flex-wrap:wrap;animation:fadeUp .6s ease-out}
        .search-wrap{flex:1;min-width:200px;position:relative}
        .search-wrap input{width:100%;padding:11px 16px 11px 40px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:border .2s;font-family:inherit}
        .search-wrap input:focus{border-color:var(--accent)}
        .search-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
        .sort-select{padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;cursor:pointer;font-family:inherit}

        /* Categories */
        .categories{padding:0 0 12px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;animation:fadeUp .7s ease-out}
        .categories::-webkit-scrollbar{display:none}
        .cat-pill{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
        .cat-pill:hover{border-color:var(--accent);color:var(--text)}
        .cat-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

        /* Product grid */
        .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:8px 0 80px}
        .product-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .3s;cursor:pointer;animation:fadeUp .5s ease-out both;position:relative}
        .product-card:nth-child(1){animation-delay:0s}
        .product-card:nth-child(2){animation-delay:.05s}
        .product-card:nth-child(3){animation-delay:.1s}
        .product-card:nth-child(4){animation-delay:.15s}
        .product-card:nth-child(5){animation-delay:.2s}
        .product-card:nth-child(6){animation-delay:.25s}
        .product-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 30px rgba(129,140,248,.1)}
        .product-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--card2)}
        .product-body{padding:14px}
        .product-name{font-size:14px;font-weight:600;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
        .product-price{font-size:17px;font-weight:800;color:var(--accent)}
        .product-old{font-size:13px;color:var(--muted);text-decoration:line-through;margin-left:8px}
        .product-badge{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;z-index:2}
        .product-badge.discount{background:#ef4444;color:#fff}
        .product-badge.featured{background:var(--accent);color:#fff}

        /* Loading skeleton */
        .skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
        .skeleton-card .skeleton-img{width:100%;aspect-ratio:1;border-radius:14px 14px 0 0}
        .skeleton-card .skeleton-line{height:14px;margin:10px 14px;border-radius:4px}
        .skeleton-card .skeleton-line:last-child{width:60%}

        /* Empty state */
        .empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
        .empty-state .icon{font-size:64px;margin-bottom:16px;opacity:.3}
        .empty-state h3{font-size:18px;margin-bottom:6px;color:var(--text)}
        .empty-state p{font-size:14px}

        /* Load more */
        .load-more{text-align:center;padding:20px 0 60px}
        .load-more button{padding:12px 40px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
        .load-more button:hover{background:var(--card2);border-color:var(--accent)}

        /* Cart Drawer */
        .cart-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:40;opacity:0;pointer-events:none;transition:opacity .3s}
        .cart-overlay.open{opacity:1;pointer-events:auto}
        .cart-drawer{position:fixed;top:0;right:0;width:100%;max-width:400px;height:100%;background:var(--card);z-index:50;transform:translateX(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;border-left:1px solid var(--border)}
        .cart-drawer.open{transform:translateX(0)}
        .cart-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
        .cart-header h2{font-size:18px;font-weight:700}
        .cart-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;padding:4px}
        .cart-items{flex:1;overflow-y:auto;padding:12px 16px}
        .cart-item{display:flex;gap:12px;padding:12px;border-radius:10px;background:var(--bg);margin-bottom:8px;animation:fadeUp .3s ease-out}
        .cart-item-img{width:64px;height:64px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--card2)}
        .cart-item-info{flex:1;min-width:0}
        .cart-item-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .cart-item-price{font-size:14px;font-weight:700;color:var(--accent)}
        .cart-item-qty{display:flex;align-items:center;gap:8px;margin-top:6px}
        .cart-qty-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .cart-qty-btn:hover{background:var(--card2);border-color:var(--accent)}
        .cart-qty-val{font-size:14px;font-weight:600;min-width:20px;text-align:center}
        .cart-item-remove{color:var(--muted);font-size:12px;cursor:pointer;padding:4px;transition:color .2s}
        .cart-item-remove:hover{color:#ef4444}
        .cart-footer{border-top:1px solid var(--border);padding:16px 20px}
        .cart-total{display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin-bottom:12px}
        .cart-subtotal{font-size:13px;color:var(--muted);text-align:right;margin-bottom:12px}
        .cart-btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
        .cart-btn.primary{background:var(--accent);color:#fff}
        .cart-btn.primary:hover{opacity:.9}
        .cart-btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);margin-top:8px}
        .cart-empty{text-align:center;padding:60px 20px;color:var(--muted)}
        .cart-empty .icon{font-size:48px;margin-bottom:12px;opacity:.3}

        /* Toast */
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:14px;z-index:60;opacity:0;transition:all .3s;pointer-events:none;background:var(--card);border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.4)}
        .toast.show{opacity:1}

        @media(max-width:600px){.product-grid{grid-template-columns:repeat(2,1fr);gap:10px}.product-body{padding:10px}.product-name{font-size:13px}.product-price{font-size:15px}.store-header{padding:20px 10px 16px}.toolbar{flex-direction:column;align-items:stretch}.cart-drawer{max-width:100%}}
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/" class="topbar-brand">Flay</a>
        <div class="topbar-actions">
            <button class="topbar-btn" onclick="toggleCart()">&#128722;<span class="cart-badge" id="cartCount" style="display:none">0</span></button>
        </div>
    </div>

    <div class="container" id="app">
        <div class="store-header" id="storeHeader">
            <div class="store-logo" id="storeLogo">F</div>
            <div class="store-name" id="storeName">Boutique</div>
            <div class="store-desc" id="storeDesc">Decouvrez nos produits</div>
            <div class="store-map" id="storeMap"><div id="storeProfileMap"></div><div class="map-addr" id="storeMapAddr"></div></div>
        </div>

        <div class="toolbar">
            <div class="search-wrap">
                <span class="icon">&#128269;</span>
                <input type="text" id="searchInput" placeholder="Rechercher un produit..." oninput="debounceSearch()">
            </div>
            <select class="sort-select" id="sortSelect" onchange="loadProducts(1)">
                <option value="newest">Plus recents</option>
                <option value="price_asc">Prix croissant</option>
                <option value="price_desc">Prix decroissant</option>
                <option value="popular">Plus populaires</option>
            </select>
        </div>

        <div class="categories" id="categories"></div>

        <div class="social-share" id="socialShare" style="display:flex;gap:8px;padding:8px 0 16px;flex-wrap:wrap;justify-content:center">
            <span style="font-size:13px;color:var(--muted);margin-right:8px;display:flex;align-items:center">&#128257; Partager</span>
            <button class="share-btn" data-platform="whatsapp" style="background:#25D366" onclick="shareStore('whatsapp')">WA</button>
            <button class="share-btn" data-platform="facebook" style="background:#1877F2" onclick="shareStore('facebook')">fb</button>
            <button class="share-btn" data-platform="twitter" style="background:#000" onclick="shareStore('twitter')">X</button>
            <button class="share-btn" data-platform="telegram" style="background:#0088CC" onclick="shareStore('telegram')">TG</button>
            <button class="share-btn" data-platform="pinterest" style="background:#BD081C" onclick="shareStore('pinterest')">Pin</button>
            <button class="share-btn native" style="background:var(--accent)" onclick="nativeShare()">&#128257;</button>
        </div>
        <style>
            .share-btn{color:#fff;border:none;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:transform .15s,opacity .15s;letter-spacing:.3px}
            .share-btn:hover{transform:scale(1.08);opacity:.9}
            .share-btn.native{font-size:16px;padding:6px 10px}
        </style>

        <div class="popular-section" id="popularSection" style="display:none;margin-bottom:24px">
            <h3 style="font-size:16px;font-weight:700;margin-bottom:12px">&#128293; Populaires</h3>
            <div class="popular-scroll" style="display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;-webkit-overflow-scrolling:touch">
            </div>
        </div>
        <style>
            .popular-scroll::-webkit-scrollbar{display:none}
            .popular-card{min-width:180px;max-width:180px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;flex-shrink:0;transition:all .2s}
            .popular-card:hover{transform:translateY(-3px);border-color:var(--accent)}
            .popular-card img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--card2)}
            .popular-body{padding:10px}
            .popular-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
            .popular-price{font-size:15px;font-weight:700;color:var(--accent)}
        </style>

        <div class="product-grid" id="productGrid"></div>
        <div class="load-more" id="loadMore"><button onclick="loadMore()">Charger plus</button></div>
    </div>

    <!-- Cart Drawer -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2>&#128722; Panier</h2>
            <button class="cart-close" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty"><div class="icon">&#128722;</div><p>Votre panier est vide</p></div>
        </div>
        <div class="cart-footer" id="cartFooter" style="display:none">
            <div class="cart-subtotal" id="cartSubtotal">0 articles</div>
            <div class="cart-total"><span>Total</span><span id="cartTotal">0 XOF</span></div>
            <button class="cart-btn primary" onclick="goToCheckout()">Commander</button>
            <button class="cart-btn secondary" onclick="closeAndBrowse()">Continuer mes achats</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let userId='', page=1, totalPages=1, isLoading=false, cart={items:[],total:0,itemCount:0,currency:'XOF'};
        let searchTimer=null;
        function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

        function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

        function renderStoreMap(lat,lng,addr){
            var section=document.getElementById('storeMap');
            section.style.display='block';
            document.getElementById('storeMapAddr').textContent=addr;
            setTimeout(function(){
                var map=L.map('storeProfileMap',{scrollWheelZoom:false,zoomControl:false}).setView([lat,lng],15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:19}).addTo(map);
                L.marker([lat,lng]).addTo(map);
                setTimeout(function(){map.invalidateSize()},300);
            },200);
        }

        function getStoreId(){return window.location.pathname.split('/store/')[1]||''}

        async function loadStore(){
            userId=getStoreId();
            if(!userId){document.getElementById('productGrid').innerHTML='<div class="empty-state"><div class="icon">&#128274;</div><h3>Boutique introuvable</h3></div>';return}
            try{
                const r=await fetch('/api/products/'+userId+'?page=1&limit=1');
                if(!r.ok){document.getElementById('productGrid').innerHTML='<div class="empty-state"><div class="icon">&#128274;</div><h3>Boutique introuvable</h3></div>';return}
                const d=await r.json();
                if(d.storeName)document.getElementById('storeName').textContent=d.storeName;
                if(d.storeDescription)document.getElementById('storeDesc').textContent=d.storeDescription;
                if(d.profileLocation&&d.profileLocation.lat&&d.profileLocation.lng){
                    renderStoreMap(d.profileLocation.lat,d.profileLocation.lng,d.profileLocation.address||'');
                }
                loadCategories();
                loadProducts(1);
                loadPopular();
            }catch(e){document.getElementById('productGrid').innerHTML='<div class="empty-state"><div class="icon">&#9888;</div><h3>Erreur de chargement</h3></div>'}
            loadCart();
        }

        async function loadPopular(){
            try{
                const r=await fetch('/api/products/popular/'+userId+'?limit=10');
                const d=await r.json();
                const items=d.recommendations||[];
                if(items.length){
                    document.getElementById('popularSection').style.display='block';
                    const scroll=document.querySelector('.popular-scroll');
                    scroll.innerHTML=items.map(p=>'<div class="popular-card" onclick="window.location=\'/product/'+esc(p.id)+'\'"><img src="'+(p.thumbnail||'/placeholder.png')+'" alt="'+esc(p.name)+'" loading="lazy"><div class="popular-body"><div class="popular-name">'+esc(p.name)+'</div><div class="popular-price">'+Number(p.price).toLocaleString()+'</div></div></div>').join('');
                }
            }catch(e){}
        }

        async function loadCategories(){
            try{
                const r=await fetch('/api/categories/'+userId+'/public');
                const d=await r.json();
                if(d.categories&&d.categories.length){
                    let html='<button class="cat-pill active" onclick="filterCategory(this,\'\')">Tous</button>';
                    d.categories.forEach(c=>{html+='<button class="cat-pill" onclick="filterCategory(this,\''+esc(c.id)+'\')">'+esc(c.name)+'</button>'});
                    document.getElementById('categories').innerHTML=html;
                }
            }catch(e){}
        }

        let currentCategory='', currentSearch='';

        function filterCategory(el,catId){
            document.querySelectorAll('.cat-pill').forEach(c=>c.classList.remove('active'));
            el.classList.add('active');
            currentCategory=catId;
            loadProducts(1);
        }

        function debounceSearch(){
            clearTimeout(searchTimer);
            searchTimer=setTimeout(()=>{
                currentSearch=document.getElementById('searchInput').value;
                loadProducts(1);
            },300);
        }

        document.getElementById('sortSelect').addEventListener('change',()=>loadProducts(1));

        async function loadProducts(resetPage){
            if(isLoading)return;
            isLoading=true;
            if(resetPage){page=1;document.getElementById('productGrid').innerHTML=''}
            const sort=document.getElementById('sortSelect').value;
            const params=new URLSearchParams({page,limit:12,sort});
            if(currentCategory)params.set('category',currentCategory);
            if(currentSearch)params.set('search',currentSearch);
            try{
                const r=await fetch('/api/products/'+userId+'?'+params);
                const d=await r.json();
                totalPages=d.pagination?.totalPages||1;
                const items=d.items||[];
                if(resetPage&&!items.length){
                    document.getElementById('productGrid').innerHTML='<div class="empty-state"><div class="icon">&#128230;</div><h3>Aucun produit</h3><p>Cette boutique n\'a pas encore de produits</p></div>';
                    document.getElementById('loadMore').style.display='none';
                }else{
                    if(resetPage)document.getElementById('productGrid').innerHTML='';
                    items.forEach((p,i)=>{
                        const img=p.thumbnail||(Array.isArray(p.images)?p.images[0]:'')||'';
                        const discount=p.comparePrice>p.price?Math.round((1-p.price/p.comparePrice)*100):0;
                        const card=document.createElement('div');
                        card.className='product-card';
                        card.style.animationDelay=(i+'*0.05s');
                        card.innerHTML='<img class="product-img" src="'+(img||'/placeholder.png')+'" alt="'+esc(p.name||'')+'" loading="lazy"'+(img?'':' style="padding:32px"')+'>'+
                            (discount?'<span class="product-badge discount">-'+discount+'%</span>':'')+
                            (p.featured?'<span class="product-badge featured">En vedette</span>':'')+
                            '<div class="product-body"><div class="product-name">'+esc(p.name||'')+'</div>'+
                            '<div><span class="product-price">'+Number(p.price).toLocaleString()+'</span>'+
                            (p.comparePrice>p.price?'<span class="product-old">'+Number(p.comparePrice).toLocaleString()+'</span>':'')+'</div></div>';
                        card.onclick=()=>window.location='/product/'+p.id;
                        document.getElementById('productGrid').appendChild(card);
                    });
                    document.getElementById('loadMore').style.display=page<totalPages?'block':'none';
                }
            }catch(e){showToast('Erreur de chargement')}
            isLoading=false;
        }

        function loadMore(){page++;loadProducts(0)}

        // ===== CART =====
        function toggleCart(){
            const d=document.getElementById('cartDrawer');
            const o=document.getElementById('cartOverlay');
            d.classList.toggle('open');o.classList.toggle('open');
        }
        function closeAndBrowse(){toggleCart()}

        function formatPrice(n){return Number(n).toLocaleString()+' '+cart.currency}

        async function loadCart(){
            const token=localStorage.getItem('flay_token');
            if(!token)return;
            try{
                const r=await fetch('/api/cart',{headers:{'Authorization':'Bearer '+token}});
                if(r.ok)cart=await r.json();
                if(!cart.items)cart.items=[];
                updateCartUI();
            }catch(e){}
        }

        function updateCartUI(){
            const badge=document.getElementById('cartCount');
            const count=cart.items.reduce((s,i)=>s+i.quantity,0);
            if(count>0){badge.textContent=count;badge.style.display='flex'}else badge.style.display='none';

            const itemsEl=document.getElementById('cartItems');
            const footerEl=document.getElementById('cartFooter');
            if(!cart.items||!cart.items.length){
                itemsEl.innerHTML='<div class="cart-empty"><div class="icon">&#128722;</div><p>Votre panier est vide</p></div>';
                footerEl.style.display='none';return;
            }
            footerEl.style.display='block';
            document.getElementById('cartSubtotal').textContent=cart.items.length+' article'+(cart.items.length>1?'s':'');
            document.getElementById('cartTotal').textContent=formatPrice(cart.total);

            itemsEl.innerHTML=cart.items.map((item,i)=>'<div class="cart-item"><img class="cart-item-img" src="'+(item.image||'/placeholder.png')+'" alt="'+esc(item.name)+'">'+
                '<div class="cart-item-info"><div class="cart-item-name">'+esc(item.name)+'</div>'+
                '<div class="cart-item-price">'+formatPrice(item.price)+'</div>'+
                '<div class="cart-item-qty"><button class="cart-qty-btn" onclick="updateQty(\''+esc(item.productId)+'\','+(item.quantity-1)+')">-</button>'+
                '<span class="cart-qty-val">'+item.quantity+'</span>'+
                '<button class="cart-qty-btn" onclick="updateQty(\''+item.productId+'\','+(item.quantity+1)+')">+</button></div></div>'+
                '<span class="cart-item-remove" onclick="removeFromCart(\''+item.productId+'\')">&#10005;</span></div>').join('');
        }

        async function updateQty(pid,qty){
            if(qty<1)return removeFromCart(pid);
            const token=localStorage.getItem('flay_token');
            if(!token){showToast('Connectez-vous pour modifier le panier');return}
            try{
                const r=await fetch('/api/cart/item',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({productId:pid,quantity:qty})});
                if(r.ok){cart=await r.json();updateCartUI()}else showToast('Erreur');
            }catch(e){showToast('Erreur')}
        }

        async function removeFromCart(pid){
            const token=localStorage.getItem('flay_token');
            if(!token)return;
            try{
                const r=await fetch('/api/cart/'+pid,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
                if(r.ok){cart=await r.json();updateCartUI()}else showToast('Erreur');
            }catch(e){showToast('Erreur')}
        }

        async function addToCart(pid,pName,pPrice,pImg){
            const token=localStorage.getItem('flay_token');
            if(!token){showToast('Connectez-vous pour ajouter au panier');return}
            try{
                const r=await fetch('/api/cart/add',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({productId:pid,quantity:1})});
                if(r.ok){cart=await r.json();updateCartUI();showToast('&#10003; Ajoute au panier')}else showToast('Erreur');
            }catch(e){showToast('Erreur')}
        }

        function goToCheckout(){window.location.href='/checkout.html'}

        function getStoreUrl(){return window.location.href.split('?')[0]}
        function shareStore(platform){
            const url=encodeURIComponent(getStoreUrl()),text=encodeURIComponent(document.getElementById('storeName').textContent+' - Decouvrez ma boutique');
            const links={whatsapp:'https://wa.me/?text='+text+'%20'+url,facebook:'https://www.facebook.com/sharer/sharer.php?u='+url,twitter:'https://twitter.com/intent/tweet?text='+text+'&url='+url,telegram:'https://t.me/share/url?url='+url+'&text='+text,pinterest:'https://pinterest.com/pin/create/button/?url='+url+'&description='+text};
            if(links[platform])window.open(links[platform],'_blank','width=600,height=400');
        }
        function nativeShare(){if(navigator.share)navigator.share({title:document.getElementById('storeName').textContent,url:getStoreUrl()}).catch(()=>{})}

        loadStore();
    </script>
</body>
