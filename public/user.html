<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flay - Profil</title>
    <meta property="og:title" content="Profil Flay" id="og-title">
    <meta property="og:description" content="Carte de visite digitale professionnelle" id="og-desc">
    <meta property="og:type" content="profile">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flay">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg">
    <link rel="icon" type="image/svg+xml" href="/logo-animated.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a1a;--card:#12121f;--card2:#1a1a2e;--border:#1e1e33;--accent:#818cf8;--accent2:#a78bfa;--text:#f1f5f9;--muted:#64748b;--radius:16px}
        body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.5}
        a{text-decoration:none;color:inherit}
        @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes scaleIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
        .page{max-width:480px;margin:0 auto;padding:0;min-height:100vh;position:relative}
        .section{animation:fadeUp 0.6s ease-out both;padding:0 16px}
        .section:nth-child(1){animation-delay:0.1s}
        .section:nth-child(2){animation-delay:0.2s}
        .section:nth-child(3){animation-delay:0.3s}
        .section:nth-child(4){animation-delay:0.4s}
        .section:nth-child(5){animation-delay:0.5s}
        .section:nth-child(6){animation-delay:0.6s}
        .label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:28px 0 12px 0;font-weight:600}
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:14px;z-index:200;opacity:0;transition:all 0.3s;pointer-events:none;background:var(--card);border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
        .toast.show{opacity:1}
        .not-found{text-align:center;padding:100px 20px;animation:fadeIn 0.5s}
        .not-found h2{font-size:24px;margin-bottom:8px;color:var(--accent)}
        .not-found p{color:var(--muted)}

        /* ===== 3D CARD ===== */
        .card-3d-wrap{perspective:1200px;padding:0 16px;margin-top:6px;animation:scaleIn 0.7s ease-out}
        .card-3d{position:relative;transform-style:preserve-3d;transition:transform 0.15s ease-out;border-radius:20px;overflow:hidden;cursor:default}
        .card-header{height:130px;border-radius:20px 20px 0 0;position:relative;overflow:hidden}
        .card-header-wave{position:absolute;bottom:-2px;left:0;width:100%;height:60px}
        .avatar-wrap{position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);z-index:2;animation:float 4s ease-in-out infinite}
        .avatar{width:88px;height:88px;border-radius:50%;border:4px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
        .card-body{border-radius:0 0 20px 20px;padding:52px 20px 24px;text-align:center;position:relative}
        .name{font-size:1.4rem;font-weight:700;margin-bottom:2px}
        .verified{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:20px;margin-bottom:6px}
        .title{font-size:0.9rem;margin-bottom:8px;font-weight:500}
        .bio{font-size:0.85rem;line-height:1.6;margin-bottom:14px;opacity:0.75}
        .location{font-size:0.82rem;opacity:0.55;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:4px}
        .stats{display:flex;justify-content:center;gap:32px;padding:16px 0;border-top:1px solid;border-bottom:1px solid;margin:0 8px;border-color:var(--border)}
        .stat{text-align:center}
        .stat-num{font-size:1.2rem;font-weight:700}
        .stat-label{font-size:0.7rem;opacity:0.5;text-transform:uppercase;letter-spacing:0.5px}

        .follow-bar{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
        .follow-btn{width:100%;padding:10px;border-radius:12px;border:none;font-weight:700;font-size:15px;cursor:pointer;transition:all 0.2s}
        .follow-btn:hover{opacity:0.9;transform:translateY(-1px)}
        /* ===== QUICK ACTIONS ===== */
        .quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 16px 0}
        .quick-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;font-weight:600;color:var(--text);transition:all 0.2s}
        .quick-btn:hover{background:var(--card2);transform:translateY(-1px);border-color:var(--accent)}
        .quick-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
        .quick-btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}

        /* ===== SERVICES ===== */
        .services{display:flex;flex-direction:column;gap:8px;padding:0 16px}
        .service-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:12px;background:var(--card);border:1px solid var(--border);transition:all 0.2s}
        .service-item:hover{border-color:var(--accent);transform:translateX(3px)}
        .service-name{font-weight:600;font-size:14px}
        .service-price{font-weight:700;font-size:14px;padding:4px 12px;border-radius:20px}

        /* ===== CONTACT ===== */
        .contact-list{display:flex;flex-direction:column;gap:8px;padding:0 16px}
        .contact-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;background:var(--card);border:1px solid var(--border);transition:all 0.2s;cursor:pointer}
        .contact-item:hover{border-color:var(--accent);transform:translateX(3px)}
        .contact-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
        .contact-text{font-size:14px;font-weight:500}
        .contact-label{font-size:11px;opacity:0.5}

        /* ===== MAP ===== */
        .map-section{padding:0 16px;animation:fadeUp 0.6s ease-out both;animation-delay:0.45s}
        .map-container{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;padding:12px}
        .map-container #profileMap{height:200px;border-radius:12px;z-index:1}
        .map-address{font-size:12px;color:var(--muted);padding:8px 4px 0;text-align:center}

        /* ===== SOCIAL ===== */
        .social-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px}
        .social-link{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--card);transition:all 0.2s;font-size:13px;font-weight:500}
        .social-link:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(129,140,248,0.1)}
        .social-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}

        /* ===== RESERVATION ===== */
        .reservation-form{padding:0 16px}
        .reservation-form form{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
        .reservation-form h3{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;opacity:0.6;text-transform:uppercase;letter-spacing:0.5px}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;transition:border 0.2s;outline:none}
        .form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .btn-submit{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-submit:hover{opacity:0.9;transform:translateY(-1px)}

        /* ===== QR CODE FAB ===== */
        .fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(129,140,248,0.4);transition:all 0.3s;z-index:50;font-size:22px}
        .fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(129,140,248,0.5)}

        /* ===== QR MODAL ===== */
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:all 0.3s;padding:20px}
        .modal-overlay.show{opacity:1;pointer-events:auto}
        .modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:320px;text-align:center;transform:scale(0.9);transition:all 0.3s}
        .modal-overlay.show .modal{transform:scale(1)}
        .modal img{width:200px;height:200px;border-radius:12px;margin:0 auto 16px;display:block;background:#fff;padding:8px}
        .modal h3{font-size:16px;margin-bottom:4px}
        .modal p{font-size:13px;color:var(--muted);margin-bottom:16px}
        .modal-close{margin-top:12px;padding:10px 24px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s}
        .modal-close:hover{background:var(--card2)}

        /* ===== CHAT WIDGET ===== */
        .chat-toggle{position:fixed;bottom:24px;left:20px;width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.3);transition:all 0.3s;z-index:50;font-size:22px;background:var(--accent);color:#fff;animation:pulse 3s ease-in-out infinite}
        .chat-toggle:hover{transform:scale(1.1)}
        .chat-panel{position:fixed;bottom:0;left:0;width:100%;height:70vh;max-height:500px;background:var(--card);border-radius:20px 20px 0 0;z-index:90;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);display:flex;flex-direction:column;border:1px solid var(--border);border-bottom:none;box-shadow:0 -10px 40px rgba(0,0,0,0.3)}
        .chat-panel.open{transform:translateY(0)}
        .chat-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
        .chat-header h3{font-size:15px;font-weight:700}
        .chat-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:4px}
        .chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}
        .chat-msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.4;word-wrap:break-word}
        .chat-msg.visitor{background:var(--card2);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
        .chat-msg.owner{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
        .chat-msg .time{font-size:10px;opacity:0.5;margin-top:4px;display:block}
        .chat-empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
        .chat-input-wrap{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:var(--bg);border-radius:0 0 20px 20px}
        .chat-input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:border 0.2s}
        .chat-input:focus{border-color:var(--accent)}
        .chat-send{width:40px;height:40px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;font-size:16px}
        .chat-send:hover{background:var(--accent2);transform:scale(1.05)}
        .chat-send:disabled{opacity:0.3;cursor:not-allowed}
        .chat-connecting{text-align:center;padding:8px;font-size:12px;color:var(--muted)}

        /* ===== POWERED ===== */
        .powered{text-align:center;padding:24px 16px 90px;font-size:11px;opacity:0.3}
        .powered a{opacity:0.7;color:var(--accent)}

        @media (max-width:480px){.card-3d-wrap{padding:0 10px}.section{padding:0 10px}.services,.contact-list,.social-grid,.reservation-form,.quick-actions{padding:0 10px}}
    </style>
</head>
<body>
    <div class="page" id="app">
        <div class="section" id="card-3d-section">
            <div class="card-3d-wrap" id="card3dWrap">
                <div class="card-3d" id="card3d">
                    <div class="card-header" id="cardHeader">
                        <svg class="card-header-wave" viewBox="0 0 500 60" preserveAspectRatio="none"><path d="M0,30 C150,60 350,0 500,30 L500,60 L0,60 Z" fill="var(--bg)"/></svg>
                    </div>
                    <div class="avatar-wrap"><div class="avatar" id="avatar">F</div></div>
                    <div class="card-body" id="cardBody">
                        <div class="name" id="pName">Chargement...</div>
                        <div class="verified" id="pVerified" style="display:none">&#10003; Compte verifie</div>
                        <div class="title" id="pTitle"></div>
                        <div class="bio" id="pBio"></div>
                        <div class="location" id="pLocation"></div>
                        <div class="stats"><div class="stat"><div class="stat-num" id="statViews">0</div><div class="stat-label">Vues</div></div><div class="stat"><div class="stat-num" id="statClicks">0</div><div class="stat-label">Clics</div></div><div class="stat"><div class="stat-num" id="statFollowers">0</div><div class="stat-label">Abonnes</div></div></div><div class="follow-bar" id="followBar" style="display:none"><button class="follow-btn" id="followBtn">Suivre</button></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="quick-actions" id="actionBtns" style="display:none">
            <button class="quick-btn primary" id="shareBtn">&#128257; Partager</button>
            <button class="quick-btn" id="qrBtn">&#128246; QR Code</button>
        </div>

        <div class="section" id="svcSection" style="display:none">
            <div class="label">Services & Tarifs</div>
            <div class="services" id="svcList"></div>
        </div>

        <div class="section" id="contactSection" style="display:none">
            <div class="label">Contact</div>
            <div class="contact-list" id="contactList"></div>
        </div>

        <div class="section" id="socialSection" style="display:none">
            <div class="label">Reseaux sociaux</div>
            <div class="social-grid" id="socialList"></div>
        </div>

        <div class="section" id="webSection" style="display:none">
            <div class="label">Site web</div>
            <div class="contact-list" id="webList"></div>
        </div>

        <div class="section map-section" id="mapSection" style="display:none">
            <div class="label">Localisation</div>
            <div class="map-container">
                <div id="profileMap"></div>
                <div class="map-address" id="mapAddress"></div>
            </div>
        </div>

        <div class="section" id="resSection" style="display:none">
            <div class="label">Prendre rendez-vous</div>
            <div class="reservation-form" id="resForm"></div>
        </div>

        <div class="powered">Propulse par <a href="/">Flay</a></div>
    </div>

    <!-- QR Modal -->
    <div class="modal-overlay" id="qrModal">
        <div class="modal">
            <img id="qrImage" src="" alt="QR Code">
            <h3>Scannez mon profil</h3>
            <p id="qrUrl">flay.ci/p/...</p>
            <button class="modal-close" onclick="closeQR()">Fermer</button>
        </div>
    </div>

    <!-- Chat Widget -->
    <button class="chat-toggle" id="chatToggle" onclick="toggleChat()" title="Discuter">&#128172;</button>
    <div class="chat-panel" id="chatPanel">
        <div class="chat-header"><h3>&#128172; Discuter</h3><button class="chat-close" onclick="toggleChat()">&times;</button></div>
        <div class="chat-messages" id="chatMessages"><div class="chat-empty">Connectez-vous pour discuter...</div></div>
        <div class="chat-input-wrap">
            <input class="chat-input" id="chatInput" placeholder="Votre message..." disabled onkeydown="if(event.key==='Enter')sendChat()">
            <button class="chat-send" id="chatSend" onclick="sendChat()" disabled>&#10148;</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const THEMES={
            dark:{bg:'#1a1a2e',card:'#16213e',card2:'#1a1a2e',accent:'#667eea',accent2:'#764ba2',text:'#fff'},
            midnight:{bg:'#0a0a23',card:'#111133',card2:'#1a1a40',accent:'#4a90d9',accent2:'#357abd',text:'#fff'},
            ocean:{bg:'#0a192f',card:'#112240',card2:'#1a3050',accent:'#64ffda',accent2:'#4ad0b0',text:'#fff'},
            emerald:{bg:'#0d2818',card:'#1a3a2a',card2:'#224a35',accent:'#2ecc71',accent2:'#27ae60',text:'#fff'},
            sunset:{bg:'#1a0a0a',card:'#2a1515',card2:'#352020',accent:'#ff6b6b',accent2:'#ffa500',text:'#fff'},
            electric:{bg:'#0a0a1a',card:'#15152a',card2:'#1f1f3a',accent:'#a855f7',accent2:'#ec4899',text:'#fff'},
            rose:{bg:'#1a0a15',card:'#2a1525',card2:'#352030',accent:'#f472b6',accent2:'#ec4899',text:'#fff'},
            forest:{bg:'#0a1a0a',card:'#152a15',card2:'#1f351f',accent:'#4ade80',accent2:'#22c55e',text:'#fff'},
            gold:{bg:'#1a150a',card:'#2a2515',card2:'#353020',accent:'#f5a623',accent2:'#ffd700',text:'#fff'},
            aurora:{bg:'#0a0a2a',card:'#151540',card2:'#1f1f50',accent:'#00d4ff',accent2:'#a855f7',text:'#fff'},
            noir:{bg:'#0a0a0a',card:'#141414',card2:'#1e1e1e',accent:'#e0e0e0',accent2:'#ccc',text:'#fff'},
            light:{bg:'#ffffff',card:'#f8f9fa',card2:'#f0f2f5',accent:'#667eea',accent2:'#764ba2',text:'#1a1a2e'},
            daylight:{bg:'#fafbfc',card:'#fff',card2:'#f0f2f5',accent:'#4a90d9',accent2:'#667eea',text:'#1a1a2e'},
            ivory:{bg:'#fffff0',card:'#fff',card2:'#f5f5dc',accent:'#8b7355',accent2:'#b8860b',text:'#2d2d2d'},
            cloud:{bg:'#f0f4f8',card:'#fff',card2:'#e2e8f0',accent:'#3182ce',accent2:'#63b3ed',text:'#1a202c'},
            snow:{bg:'#f8fafc',card:'#fff',card2:'#edf2f7',accent:'#805ad5',accent2:'#b794f4',text:'#1a202c'},
            cotedivoire:{bg:'#f8f400',card:'#fff',card2:'#f5f0e0',accent:'#f77f00',accent2:'#e67300',text:'#1a1a2e'},
            cotedivoire_dark:{bg:'#1a1500',card:'#2a2510',card2:'#353020',accent:'#f77f00',accent2:'#ff9020',text:'#f8f400'},
            cotedivoire_light:{bg:'#fffef5',card:'#fff',card2:'#fff9e0',accent:'#f77f00',accent2:'#e67300',text:'#1a1a2e'},
            france:{bg:'#002395',card:'#001d6e',card2:'#002a8a',accent:'#ed2939',accent2:'#ff4d4d',text:'#fff'},
            france_dark:{bg:'#000d3a',card:'#001250',card2:'#001a60',accent:'#ed2939',accent2:'#ff3a4a',text:'#fff'},
            france_light:{bg:'#f0f4ff',card:'#fff',card2:'#e0e8ff',accent:'#ed2939',accent2:'#d41f2f',text:'#002395'},
            senegal:{bg:'#00853f',card:'#006b32',card2:'#007a38',accent:'#fdef42',accent2:'#fcd116',text:'#fff'},
            senegal_dark:{bg:'#002a15',card:'#003a20',card2:'#004525',accent:'#fdef42',accent2:'#ffe855',text:'#fdef42'},
            senegal_light:{bg:'#f0fff5',card:'#fff',card2:'#e0ffe8',accent:'#00853f',accent2:'#006b32',text:'#004d28'},
            cameroun:{bg:'#007a5e',card:'#00664d',card2:'#007055',accent:'#fcd116',accent2:'#e8bd00',text:'#fff'},
            mali:{bg:'#14b53a',card:'#109930',card2:'#12a835',accent:'#fcd116',accent2:'#e8bd00',text:'#fff'},
            burkina:{bg:'#ef2b2d',card:'#d42527',card2:'#e03030',accent:'#fcd116',accent2:'#e8bd00',text:'#fff'},
            ghana:{bg:'#006b3f',card:'#005532',card2:'#006038',accent:'#fcd116',accent2:'#e8bd00',text:'#fff'},
            nigeria:{bg:'#008751',card:'#006d41',card2:'#007a48',accent:'#fff',accent2:'#eee',text:'#fff'},
            togo:{bg:'#006a1c',card:'#005516',card2:'#006018',accent:'#fcd116',accent2:'#e8bd00',text:'#fff'},
            benin:{bg:'#008751',card:'#006d41',card2:'#007a48',accent:'#fcd116',accent2:'#e8bd00',text:'#fff'},
            congo:{bg:'#009543',card:'#007a37',card2:'#008840',accent:'#fbde4a',accent2:'#e8cc3a',text:'#fff'},
            gabon:{bg:'#009e60',card:'#008250',card2:'#009058',accent:'#fcd116',accent2:'#e8bd00',text:'#fff'},
            guinee:{bg:'#ce1126',card:'#b00e22',card2:'#c01028',accent:'#fcd116',accent2:'#e8bd00',text:'#fff'},
            niger:{bg:'#e05206',card:'#c4470a',card2:'#d04d0e',accent:'#fff',accent2:'#eee',text:'#fff'},
            togo_sunset:{bg:'#ff6b35',card:'#e05a2a',card2:'#ee6030',accent:'#ffd166',accent2:'#eec55a',text:'#fff'},
            afrique:{bg:'#000000',card:'#1a1a1a',card2:'#222222',accent:'#f7941d',accent2:'#e74c3c',text:'#fff'},
            noel:{bg:'#1a3a1a',card:'#0d2818',card2:'#153020',accent:'#e74c3c',accent2:'#ffd700',text:'#fff'},
            halloween:{bg:'#1a0a00',card:'#2a1500',card2:'#352000',accent:'#ff6600',accent2:'#ff9900',text:'#fff'},
            love:{bg:'#2a0a15',card:'#3a1525',card2:'#452030',accent:'#ff1493',accent2:'#ff69b4',text:'#fff'},
            royal:{bg:'#1a0a2a',card:'#2a1540',card2:'#352050',accent:'#9b59b6',accent2:'#ffd700',text:'#fff'},
            nature:{bg:'#0a1a0a',card:'#1b5e20',card2:'#226b28',accent:'#66bb6a',accent2:'#aed581',text:'#e8f5e9'},
            cyber:{bg:'#0a0a1a',card:'#0f0f2a',card2:'#151535',accent:'#00ff88',accent2:'#0088ff',text:'#00ff88'},
            pastel:{bg:'#fdf2f8',card:'#fff',card2:'#fce7f3',accent:'#ec4899',accent2:'#f59e0b',text:'#831843'},
            mandy:{bg:'#fde68a',card:'#fff',card2:'#fcd34d',accent:'#dc2626',accent2:'#f59e0b',text:'#78350f'},
            ocean_light:{bg:'#f0f9ff',card:'#fff',card2:'#e0f2fe',accent:'#0284c7',accent2:'#38bdf8',text:'#0c4a6e'},
            sunset_light:{bg:'#fff7ed',card:'#fff',card2:'#ffedd5',accent:'#ea580c',accent2:'#f59e0b',text:'#7c2d12'}
        };

        let slug='', roomId='', visitorName='', chatConnected=false, pollInterval=null;

        function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

        function getProfileUrl(){return window.location.origin+'/p/'+slug}

        function closeQR(){document.getElementById('qrModal').classList.remove('show')}
        document.getElementById('qrModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeQR()});

        function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
        async function loadProfile(){
            slug=window.location.pathname.split('/p/')[1];
            if(!slug){document.getElementById('card-3d-section').innerHTML='<div class="not-found"><h2>Lien invalide</h2></div>';return}
            try{
                const r=await fetch('/api/profile/public/'+slug);
                if(!r.ok){document.getElementById('card-3d-section').innerHTML='<div class="not-found"><h2>Profil non trouve</h2><p>Ce lien n\'existe pas ou a ete supprime</p></div>';return}
                const d=await r.json();const p=d.profile;
                const name=d.authorName||'Utilisateur';
                const t=THEMES[p.theme]||THEMES.dark;

                // Apply theme
                Object.entries(t).forEach(([k,v])=>{document.documentElement.style.setProperty('--'+k,v)});
                document.body.style.background=t.bg;
                document.getElementById('og-title').content=name+' - Flay';

                // Card
                document.getElementById('avatar').textContent=name[0].toUpperCase();
                if(p.avatar&&/^https?:\/\//i.test(p.avatar))document.getElementById('avatar').innerHTML='<img src="'+p.avatar.replace(/"/g,'&quot;')+'" style="width:100%;height:100%;border-radius:50%;object-fit:cover">';
                document.getElementById('cardHeader').style.background='linear-gradient(135deg,'+t.accent+',transparent 70%)';
                document.getElementById('cardBody').style.background=t.card;
                document.getElementById('pName').textContent=name;
                document.getElementById('pName').style.color=t.text;
                if(d.isVerified){const v=document.getElementById('pVerified');v.style.display='inline-flex';v.style.background=t.accent+'20';v.style.color=t.accent}
                if(p.title){document.getElementById('pTitle').textContent=p.title;document.getElementById('pTitle').style.color=t.accent}
                if(p.bio)document.getElementById('pBio').textContent=p.bio;
                if(p.location)document.getElementById('pLocation').textContent='📍 '+p.location;
                if(p.locationData&&p.locationData.lat&&p.locationData.lng){
                    renderMap(p.locationData.lat,p.locationData.lng,p.locationData.address||p.location||'');
                }
                document.getElementById('statViews').textContent=p.views||0;
                document.getElementById('statClicks').textContent=p.clicks||0;

                // Followers
                const profileOwnerId=p.userId;
                fetch('/api/followers/'+profileOwnerId).then(r=>r.json()).then(d=>{document.getElementById('statFollowers').textContent=d.count||0}).catch(()=>{});
                const token=localStorage.getItem('flay_token');
                if(token){
                    try{
                        const payload=JSON.parse(atob(token.split('.')[1]));
                        if(payload.userId!==profileOwnerId){
                            const fb=document.getElementById('followBar');fb.style.display='block';
                            const btn=document.getElementById('followBtn');
                            fetch('/api/followers/'+profileOwnerId+'/check',{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json()).then(d=>{
                                if(d.following){btn.textContent='Abonne';btn.style.background='var(--accent)';btn.style.color='#fff'}
                                else{btn.textContent='Suivre';btn.style.background='var(--accent2)';btn.style.color='#fff'}
                                btn.onclick=async()=>{
                                    if(d.following){
                                        await fetch('/api/followers/unfollow',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({userId:profileOwnerId})});
                                        d.following=false;btn.textContent='Suivre';btn.style.background='var(--accent2)';btn.style.color='#fff'
                                    }else{
                                        await fetch('/api/followers/follow',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({userId:profileOwnerId})});
                                        d.following=true;btn.textContent='Abonne';btn.style.background='var(--accent)';btn.style.color='#fff'
                                    }
                                    fetch('/api/followers/'+profileOwnerId).then(r=>r.json()).then(d2=>{document.getElementById('statFollowers').textContent=d2.count||0}).catch(()=>{});
                                };
                            }).catch(()=>{});
                        }
                    }catch(e){}
                }

                // Actions
                document.getElementById('actionBtns').style.display='grid';

                // Services
                if(p.services&&p.services.length){
                    document.getElementById('svcSection').style.display='block';
                    document.getElementById('svcList').innerHTML=p.services.map(s=>'<div class="service-item" style="background:'+t.card+';border-color:'+t.border+'"><span class="service-name">'+esc(s.name)+'</span>'+(s.price?'<span class="service-price" style="background:'+t.accent+'20;color:'+t.accent+'">'+esc(s.price)+'</span>':'')+'</div>').join('');
                }

                // Contact
                let contactHTML='';
                if(p.phone)contactHTML+='<a href="tel:'+esc(p.phone)+'" class="contact-item" style="background:'+t.card+';border-color:'+t.border+'"><div class="contact-icon" style="background:'+t.accent+'20;color:'+t.accent+'">&#128222;</div><div><div class="contact-text">'+esc(p.phone)+'</div><div class="contact-label">Telephone</div></div></a>';
                if(p.email)contactHTML+='<a href="mailto:'+esc(p.email)+'" class="contact-item" style="background:'+t.card+';border-color:'+t.border+'"><div class="contact-icon" style="background:'+t.accent+'20;color:'+t.accent+'">&#9993;</div><div><div class="contact-text">'+esc(p.email)+'</div><div class="contact-label">Email</div></div></a>';
                if(contactHTML){document.getElementById('contactSection').style.display='block';document.getElementById('contactList').innerHTML=contactHTML}

                // Website
                if(p.website){
                    document.getElementById('webSection').style.display='block';
                    document.getElementById('webList').innerHTML='<a href="'+esc(p.website)+'" target="_blank" class="contact-item" style="background:'+t.card+';border-color:'+t.border+'"><div class="contact-icon" style="background:'+t.accent+'20;color:'+t.accent+'">&#127760;</div><div><div class="contact-text">'+esc(p.website)+'</div><div class="contact-label">Site web</div></div></a>';
                }

                // Social
                const socialMap={facebook:'Facebook',instagram:'Instagram',twitter:'X / Twitter',linkedin:'LinkedIn',whatsapp:'WhatsApp',tiktok:'TikTok',youtube:'YouTube',telegram:'Telegram',snapchat:'Snapchat',pinterest:'Pinterest',threads:'Threads',discord:'Discord'};
                const socialColors={facebook:'#1877F2',instagram:'#E4405F',twitter:'#000000',linkedin:'#0A66C2',whatsapp:'#25D366',tiktok:'#000000',youtube:'#FF0000',telegram:'#0088CC',snapchat:'#FFFC00',pinterest:'#BD081C',threads:'#000000',discord:'#5865F2'};
                const socialIcons={facebook:'f',instagram:'&#128247;',twitter:'&#120143;',linkedin:'in',whatsapp:'&#128172;',tiktok:'&#127916;',youtube:'&#128249;',telegram:'&#9992;',snapchat:'&#128123;',pinterest:'&#128204;',threads:'&#129525;',discord:'&#128172;'};
                if(p.socials){
                    const items=Object.keys(socialMap).filter(k=>p.socials[k]);
                    if(items.length){
                        document.getElementById('socialSection').style.display='block';
                        document.getElementById('socialList').innerHTML=items.map(k=>'<a href="'+esc(p.socials[k])+'" target="_blank" class="social-link" style="background:'+socialColors[k]+';color:#fff;border-color:'+socialColors[k]+'"><span class="social-icon">'+socialIcons[k]+'</span><span>'+socialMap[k]+'</span></a>').join('');
                    }
                }

                // Reservation form
                document.getElementById('resSection').style.display='block';
                const svcOpts=p.services&&p.services.length?p.services.map(s=>'<option value="'+esc(s.name+' '+(s.price||''))+'">'+esc(s.name)+(s.price?' - '+esc(s.price):'')+'</option>').join(''):'';
                document.getElementById('resForm').innerHTML='<form onsubmit="submitRes(event)"><div class="form-group"><label>Nom</label><input type="text" id="rName" required></div><div class="form-group"><label>Email</label><input type="email" id="rEmail" required></div><div class="form-group"><label>Telephone</label><input type="text" id="rPhone"></div>'+(svcOpts?'<div class="form-group"><label>Service</label><select id="rService">'+svcOpts+'</select></div>':'')+'<div class="form-row"><div class="form-group"><label>Date</label><input type="date" id="rDate" required></div><div class="form-group"><label>Heure</label><input type="time" id="rTime" required></div></div><div class="form-group"><label>Message</label><textarea id="rMsg" rows="2" placeholder="Votre message..."></textarea></div><button type="submit" class="btn-submit" style="background:'+t.accent+'">&#128197; Envoyer la reservation</button></form>';

                // QR code
                document.getElementById('qrUrl').textContent=getProfileUrl();
                fetch('/api/social/qr-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:getProfileUrl(),size:300})}).then(r=>r.json()).then(d=>{if(d.qrUrl)document.getElementById('qrImage').src=d.qrUrl}).catch(()=>{document.getElementById('qrImage').src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data='+encodeURIComponent(getProfileUrl())});

                // 3D tilt
                const card=document.getElementById('card3d');
                const wrap=document.getElementById('card3dWrap');
                wrap.addEventListener('mousemove',e=>{
                    const rect=wrap.getBoundingClientRect();
                    const x=(e.clientX-rect.left)/rect.width-0.5;
                    const y=(e.clientY-rect.top)/rect.height-0.5;
                    card.style.transform='rotateY('+(x*12)+'deg) rotateX('+(-y*12)+'deg) translateZ(10px)';
                });
                wrap.addEventListener('mouseleave',()=>{card.style.transform='rotateY(0deg) rotateX(0deg) translateZ(0px)'});
                wrap.addEventListener('touchmove',e=>{
                    const touch=e.touches[0];
                    const rect=wrap.getBoundingClientRect();
                    const x=(touch.clientX-rect.left)/rect.width-0.5;
                    const y=(touch.clientY-rect.top)/rect.height-0.5;
                    card.style.transform='rotateY('+(x*10)+'deg) rotateX('+(-y*10)+'deg) translateZ(5px)';
                },{passive:true});
                wrap.addEventListener('touchend',()=>{card.style.transform='rotateY(0deg) rotateX(0deg) translateZ(0px)'});

            }catch(e){document.getElementById('card-3d-section').innerHTML='<div class="not-found"><h2>Erreur</h2><p>Impossible de charger le profil</p></div>'}
        }

        function renderMap(lat,lng,addr){
            var section=document.getElementById('mapSection');
            section.style.display='block';
            document.getElementById('mapAddress').textContent=addr;
            setTimeout(function(){
                var map=L.map('profileMap',{scrollWheelZoom:false,zoomControl:false}).setView([lat,lng],15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:19}).addTo(map);
                L.marker([lat,lng]).addTo(map);
                setTimeout(function(){map.invalidateSize()},300);
            },200);
        }

        async function submitRes(e){
            e.preventDefault();
            try{
                const r=await fetch('/api/reservations/public/'+slug,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
                    clientName:document.getElementById('rName').value,
                    clientEmail:document.getElementById('rEmail').value,
                    clientPhone:document.getElementById('rPhone')?.value||'',
                    service:document.getElementById('rService')?.value||'',
                    date:document.getElementById('rDate').value,
                    time:document.getElementById('rTime').value,
                    notes:document.getElementById('rMsg')?.value||''
                })});
                const d=await r.json();
                if(r.ok){showToast('&#10003; Reservation envoyee !');e.target.reset()}else showToast(d.error||'Erreur');
            }catch(e){showToast('Erreur de connexion')}
        }

        // Share
        document.getElementById('shareBtn').addEventListener('click',async()=>{
            if(navigator.share)try{await navigator.share({title:document.getElementById('pName').textContent,url:getProfileUrl()})}catch(e){}
            else{navigator.clipboard.writeText(getProfileUrl());showToast('&#128279; Lien copie !')}
        });

        // QR
        document.getElementById('qrBtn').addEventListener('click',()=>document.getElementById('qrModal').classList.add('show'));

        // ===== CHAT =====
        let chatName='';
        function toggleChat(){
            const p=document.getElementById('chatPanel');
            const open=p.classList.contains('open');
            p.classList.toggle('open');
            if(!open&&!chatConnected)connectChat();
        }

        async function connectChat(){
            if(!slug||chatConnected)return;
            chatName=prompt('Votre nom pour la discussion:','Visiteur')||'Visiteur';
            visitorName=chatName;
            document.getElementById('chatMessages').innerHTML='<div class="chat-connecting">Connexion...</div>';
            try{
                const r=await fetch('/api/chat/public/'+slug,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:chatName})});
                if(!r.ok){document.getElementById('chatMessages').innerHTML='<div class="chat-empty">Erreur de connexion</div>';return}
                const d=await r.json();
                roomId=d.roomId;
                chatConnected=true;
                document.getElementById('chatInput').disabled=false;
                document.getElementById('chatSend').disabled=false;
                document.getElementById('chatInput').placeholder='Votre message...';
                document.getElementById('chatMessages').innerHTML='<div class="chat-empty">Envoyez un message pour commencer...</div>';
                pollMessages();
            }catch(e){document.getElementById('chatMessages').innerHTML='<div class="chat-empty">Erreur de connexion</div>'}
        }

        async function pollMessages(){
            if(!roomId)return;
            try{
                const r=await fetch('/api/chat/public/'+roomId+'/messages');
                const d=await r.json();
                if(d.messages&&d.messages.length){
                    const container=document.getElementById('chatMessages');
                    container.innerHTML=d.messages.map(m=>'<div class="chat-msg '+(m.role==='owner'?'owner':'visitor')+'">'+(m.role==='owner'?'<strong>Proprietaire</strong>: ':'')+esc(m.content)+'<span class="time">'+new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</span></div>').join('');
                    container.scrollTop=container.scrollHeight;
                }
            }catch(e){}
            pollInterval=setTimeout(pollMessages,3000);
        }

        async function sendChat(){
            const input=document.getElementById('chatInput');
            const msg=input.value.trim();
            if(!msg||!roomId)return;
            input.value='';
            try{
                const r=await fetch('/api/chat/public/'+roomId+'/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:chatName,content:msg})});
                if(r.ok)pollMessages();
            }catch(e){showToast('Erreur d\'envoi')}
        }

        loadProfile();
    </script>
</body>
</html>
