<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flay - Profil</title>
    <meta property="og:title" content="Profil Flay" id="og-title">
    <meta property="og:description" content="Carte de visite digitale professionnelle" id="og-desc">
    <meta property="og:type" content="profile">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;min-height:100vh}
        a{text-decoration:none;color:inherit}
        .profile-page{max-width:500px;margin:0 auto;padding:0 16px}
        .profile-header{border-radius:20px 20px 0 0;height:120px;position:relative}
        .avatar{width:100px;height:100px;border-radius:50%;border:5px solid;position:absolute;bottom:-50px;left:50%;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700}
        .profile-body{border-radius:0 0 20px 20px;padding:60px 24px 32px;text-align:center}
        .profile-name{font-size:1.5rem;font-weight:700;margin-bottom:4px}
        .verified{color:#ffc107;font-size:0.85rem;margin-bottom:4px}
        .profile-title{font-size:0.95rem;margin-bottom:12px}
        .profile-bio{font-size:0.9rem;line-height:1.5;margin-bottom:20px;opacity:0.8}
        .profile-location{font-size:0.85rem;margin-bottom:20px;opacity:0.6}
        .profile-stats{display:flex;justify-content:center;gap:32px;margin-bottom:24px;padding-bottom:24px}
        .profile-stat .num{font-size:1.2rem;font-weight:700}
        .profile-stat .label{font-size:0.75rem;opacity:0.6}
        .section-title{font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;margin:24px 0 12px;text-align:left;opacity:0.5}
        .services-list{display:flex;flex-direction:column;gap:10px}
        .service-item{border-radius:12px;padding:16px;display:flex;justify-content:space-between;align-items:center}
        .service-item .name{font-weight:600}
        .service-item .price{font-weight:600;font-size:0.95rem}
        .contact-grid{display:flex;flex-direction:column;gap:10px}
        .contact-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;transition:all 0.2s;cursor:pointer}
        .contact-item:hover{opacity:0.8}
        .contact-item .icon{font-size:1.3rem;width:30px;text-align:center}
        .contact-item .text{font-size:0.9rem}
        .social-links{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
        .social-link{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;border:1px solid;transition:all 0.2s;font-size:0.85rem}
        .reservation-form{border-radius:12px;padding:20px;margin-top:12px}
        .reservation-form h3{font-size:1rem;margin-bottom:16px}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;font-size:0.8rem;margin-bottom:4px;opacity:0.7}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #333;background:transparent;font-size:0.9rem;outline:none;font-family:inherit}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:4px}
        .powered{text-align:center;padding:24px;font-size:0.75rem;opacity:0.4}
        .powered a{opacity:1}
        .not-found{text-align:center;padding:100px 20px}
        .toast{position:fixed;bottom:20px;right:20px;padding:14px 24px;border-radius:8px;font-size:0.9rem;z-index:200;opacity:0;transform:translateY(20px);transition:all 0.3s}
        .toast.show{opacity:1;transform:translateY(0)}
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flay">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg">
    <link rel="icon" type="image/svg+xml" href="/logo-animated.svg">
    <script src="/pwa.js"></script>
</head>
<body>
    <div class="profile-page" id="content"></div>
    <div class="powered">Propulse par <a href="/">Flay</a></div>
    <div class="toast" id="toast"></div>
    <script>
        function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
        async function loadProfile(){
            const slug=window.location.pathname.split('/p/')[1];
            if(!slug){document.getElementById('content').innerHTML='<div class="not-found"><h2>Lien invalide</h2></div>';return}
            try{
                const r=await fetch(`/api/profile/public/${slug}`);
                if(!r.ok){document.getElementById('content').innerHTML='<div class="not-found"><h2>Profil non trouve</h2></div>';return}
                const d=await r.json();const p=d.profile;const name=d.authorName||'Utilisateur';
                const THEMES={dark:{bg:'#1a1a2e',card:'#16213e',accent:'#667eea',txt:'#e0e0e0'},light:{bg:'#ffffff',card:'#f5f5f5',accent:'#667eea',txt:'#333'},midnight:{bg:'#0a0a23',card:'#111133',accent:'#4a90d9',txt:'#fff'},daylight:{bg:'#fafbfc',card:'#fff',accent:'#4a90d9',txt:'#1a1a2e'},ocean:{bg:'#0a192f',card:'#112240',accent:'#64ffda',txt:'#fff'},emerald:{bg:'#0d2818',card:'#1a3a2a',accent:'#2ecc71',txt:'#fff'},sunset:{bg:'#1a0a0a',card:'#2a1515',accent:'#ff6b6b',txt:'#fff'},electric:{bg:'#0a0a1a',card:'#15152a',accent:'#a855f7',txt:'#fff'},rose:{bg:'#1a0a15',card:'#2a1525',accent:'#f472b6',txt:'#fff'},forest:{bg:'#0a1a0a',card:'#152a15',accent:'#4ade80',txt:'#fff'},gold:{bg:'#1a150a',card:'#2a2515',accent:'#f5a623',txt:'#fff'},aurora:{bg:'#0a0a2a',card:'#151540',accent:'#00d4ff',txt:'#fff'},noir:{bg:'#0a0a0a',card:'#141414',accent:'#e0e0e0',txt:'#fff'},cotedivoire:{bg:'#f8f400',card:'#fff',accent:'#f77f00',txt:'#1a1a2e'},france:{bg:'#002395',card:'#001d6e',accent:'#ed2939',txt:'#fff'},senegal:{bg:'#00853f',card:'#006b32',accent:'#fdef42',txt:'#fff'},cameroun:{bg:'#007a5e',card:'#00664d',accent:'#fcd116',txt:'#fff'},mali:{bg:'#14b53a',card:'#109930',accent:'#fcd116',txt:'#fff'},burkina:{bg:'#ef2b2d',card:'#d42527',accent:'#fcd116',txt:'#fff'},ghana:{bg:'#006b3f',card:'#005532',accent:'#fcd116',txt:'#fff'},nigeria:{bg:'#008751',card:'#006d41',accent:'#fff',txt:'#fff'},togo:{bg:'#006a1c',card:'#005516',accent:'#fcd116',txt:'#fff'},benin:{bg:'#008800',card:'#006b00',accent:'#fcd116',txt:'#fff'},congo:{bg:'#009543',card:'#007a38',accent:'#fbde4a',txt:'#fff'},guinee:{bg:'#ce1126',card:'#a50e1f',accent:'#fcd116',txt:'#fff'},niger:{bg:'#e05206',card:'#c04505',accent:'#0db02b',txt:'#fff'},afrique:{bg:'#000000',card:'#1a1a1a',accent:'#f7941d',txt:'#fff'},noel:{bg:'#1a3a1a',card:'#0d2818',accent:'#e74c3c',txt:'#fff'},halloween:{bg:'#1a0a00',card:'#2a1500',accent:'#ff6600',txt:'#fff'},love:{bg:'#2a0a15',card:'#3a1525',accent:'#ff1493',txt:'#fff'},royal:{bg:'#1a0a2a',card:'#2a1540',accent:'#9b59b6',txt:'#fff'},cyber:{bg:'#0a0a1a',card:'#0f0f2a',accent:'#00ff88',txt:'#00ff88'},pastel:{bg:'#fdf2f8',card:'#fff',accent:'#ec4899',txt:'#831843'},nature:{bg:'#0a1a0a',card:'#152a15',accent:'#4ade80',txt:'#fff'},ivory:{bg:'#fffff0',card:'#fff',accent:'#8b7355',txt:'#2d2d2d'},cloud:{bg:'#f0f4f8',card:'#fff',accent:'#3182ce',txt:'#1a202c'},snow:{bg:'#f8fafc',card:'#fff',accent:'#805ad5',txt:'#1a202c'},mandy:{bg:'#e83e6c',card:'#d63384',accent:'#fff',txt:'#fff'},ocean_light:{bg:'#e8f4f8',card:'#fff',accent:'#3182ce',txt:'#1a202c'},sunset_light:{bg:'#fdf0ed',card:'#fff',accent:'#e94560',txt:'#1a1a2e'}};
                const t=THEMES[p.theme]||THEMES.dark;const bg=t.bg,card=t.card,accent=t.accent,txt=t.txt;
                document.body.style.background=bg;document.body.style.color=txt;
                document.getElementById('og-title').content=name+' - Flay';

                let svcs='';if(p.services&&p.services.length>0){svcs=`<div class="section-title">Services & Tarifs</div><div class="services-list">${p.services.map(s=>`<div class="service-item" style="background:${card}"><span class="name">${s.name}</span>${s.price?`<span class="price" style="color:${accent}">${s.price}</span>`:''}</div>`).join('')}</div>`}

                let contact='';if(p.phone||p.email){contact='<div class="section-title">Contact</div><div class="contact-grid">';if(p.phone)contact+=`<a href="tel:${p.phone}" class="contact-item" style="background:${card}"><span class="icon">&#128222;</span><span class="text">${p.phone}</span></a>`;if(p.email)contact+=`<a href="mailto:${p.email}" class="contact-item" style="background:${card}"><span class="icon">&#9993;</span><span class="text">${p.email}</span></a>`;contact+='</div>'}

                const socialItems=[{key:'facebook',icon:'&#128100;',label:'Facebook'},{key:'instagram',icon:'&#128247;',label:'Instagram'},{key:'linkedin',icon:'&#128188;',label:'LinkedIn'},{key:'whatsapp',icon:'&#128172;',label:'WhatsApp'},{key:'tiktok',icon:'&#127916;',label:'TikTok'},{key:'youtube',icon:'&#128249;',label:'YouTube'}].filter(s=>p.socials&&p.socials[s.key]);
                let socials='';if(socialItems.length>0){socials='<div class="social-links">'+socialItems.map(s=>`<a href="${p.socials[s.key]}" target="_blank" class="social-link" style="border-color:${card}"><span class="icon">${s.icon}</span>${s.label}</a>`).join('')+'</div>'}

                let web='';if(p.website)web=`<div class="section-title">Site web</div><a href="${p.website}" target="_blank" class="contact-item" style="background:${card};text-decoration:none;display:flex"><span class="icon">&#127760;</span><span class="text">${p.website}</span></a>`;

                let svcsOpts='';if(p.services&&p.services.length>0)svcsOpts=p.services.map(s=>`<option value="${s.name}">${s.name} ${s.price?'- '+s.price:''}</option>`).join('');

                document.getElementById('content').innerHTML=`
                    <div class="profile-header" style="background:linear-gradient(135deg,${accent},transparent)">
                        <div class="avatar" style="background:${card};border-color:${bg};color:${accent}">${name[0].toUpperCase()}</div>
                    </div>
                    <div class="profile-body" style="background:${card}">
                        <div class="profile-name">${name}</div>
                        ${d.isVerified?'<div class="verified">&#9733; Compte Verifie</div>':''}
                        <div class="profile-title" style="color:${accent}">${p.title||''}</div>
                        ${p.bio?`<div class="profile-bio">${p.bio}</div>`:''}
                        ${p.location?`<div class="profile-location">&#128205; ${p.location}</div>`:''}
                        <div class="profile-stats">
                            <div class="profile-stat"><div class="num" style="color:${accent}">${p.views||0}</div><div class="label">Vues</div></div>
                            <div class="profile-stat"><div class="num" style="color:${accent}">${p.clicks||0}</div><div class="label">Clics</div></div>
                        </div>
                        ${svcs}${contact}${socials}${web}
                        <div class="section-title">Prendre rendez-vous</div>
                        <div class="reservation-form" style="background:${card}">
                            <h3>&#128197; Reservation</h3>
                            <form onsubmit="submitRes(event,'${slug}')">
                                <div class="form-group"><label>Nom</label><input type="text" id="r-name" required style="border-color:${accent}40"></div>
                                <div class="form-group"><label>Email</label><input type="email" id="r-email" required style="border-color:${accent}40"></div>
                                <div class="form-group"><label>Telephone</label><input type="text" id="r-phone" style="border-color:${accent}40"></div>
                                ${svcsOpts?`<div class="form-group"><label>Service</label><select id="r-service">${svcsOpts}</select></div>`:''}
                                <div class="form-row">
                                    <div class="form-group"><label>Date</label><input type="date" id="r-date" required style="border-color:${accent}40"></div>
                                    <div class="form-group"><label>Heure</label><input type="time" id="r-time" required style="border-color:${accent}40"></div>
                                </div>
                                <div class="form-group"><label>Message</label><textarea id="r-msg" placeholder="Votre message..." style="border-color:${accent}40"></textarea></div>
                                <button type="submit" class="btn" style="background:${accent};color:${p.theme==='light'?'#fff':bg}">Envoyer</button>
                            </form>
                        </div>
                    </div>
                `;
            }catch(e){document.getElementById('content').innerHTML='<div class="not-found"><h2>Erreur</h2></div>'}
        }
        async function submitRes(e,slug){
            e.preventDefault();
            try{
                const r=await fetch(`/api/reservation/public/${slug}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientName:document.getElementById('r-name').value,clientEmail:document.getElementById('r-email').value,clientPhone:document.getElementById('r-phone')?.value||'',service:document.getElementById('r-service')?.value||'',date:document.getElementById('r-date').value,time:document.getElementById('r-time').value,message:document.getElementById('r-msg')?.value||''})});
                const d=await r.json();
                if(r.ok){showToast('Reservation envoyee !');e.target.reset()}else{showToast(d.message||'Erreur')}
            }catch(e){showToast('Erreur de connexion')}
        }
        loadProfile();
    </script>
</body>
</html>
