<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flay - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a1a; --card: #15152a; --border: #252545; --accent: #818cf8; --text: #fff; --text2: #a0a0c0; --gradient: linear-gradient(135deg, #818cf8, #a78bfa); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .auth-card { width: 100%; max-width: 420px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; }
        .brand { text-align: center; margin-bottom: 32px; }
        .brand-name { font-size: 32px; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .brand-sub { color: var(--text2); font-size: 14px; margin-top: 4px; }
        h1 { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: var(--text2); font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
        input { width: 100%; padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; font-family: inherit; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: var(--accent); }
        .btn { width: 100%; padding: 14px; background: var(--gradient); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(129,140,248,0.3); }
        .links { text-align: center; margin-top: 24px; }
        .links a { color: var(--accent); text-decoration: none; font-size: 14px; }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#818cf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flay">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg">
    <link rel="icon" type="image/svg+xml" href="/logo-animated.svg">
    <script src="/pwa.js"></script>
</head>
<body>
    <div class="auth-card">
        <div class="brand"><div class="brand-name">Flay</div><div class="brand-sub">DIGITALSTRATEGES</div></div>
        <h1>Connexion</h1>
        <p class="subtitle">Accedez a votre espace Flay</p>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="votre@email.com" required></div>
            <div class="form-group"><label>Mot de passe</label><input type="password" name="password" placeholder="Votre mot de passe" required></div>
            <button type="submit" class="btn">Se connecter</button>
        </form>
        <div class="links">
            <a href="/forgot-password.html">Mot de passe oublie ?</a><br><br>
            <a href="/register.html">Pas encore de compte ? Creer un compte</a>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            const errEl = document.getElementById('error');
            errEl.style.display = 'none';
            const data = Object.fromEntries(new FormData(e.target));
            try {
                const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const json = await res.json();
                if (!res.ok) { errEl.textContent = json.error; errEl.style.display = 'block'; return; }
                localStorage.setItem('flay_token', json.accessToken);
                localStorage.setItem('flay_refresh', json.refreshToken);
                localStorage.setItem('flay_user', JSON.stringify(json.user));
                window.location.href = '/dashboard.html';
            } catch(err) { errEl.textContent = 'Erreur reseau'; errEl.style.display = 'block'; }
        });
    </script>
</body>
</html>
