<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>Classement des revenus · Flay Business</title>
    <meta name="theme-color" content="#f77f00">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/logo-animated.svg">
    <style>
        :root{--bg:#0f0a05;--card:#1a1208;--card2:#241b0e;--border:#3a2812;--accent:#f77f00;--accent2:#e07000;--text:#f0e6d0;--text2:#b8a880;--muted:#8a7a60;--green:#22c55e;--red:#ef4444;--gold:#eab308;--gradient:linear-gradient(135deg,#f77f00,#ff9f30);--radius:12px;--radius-lg:16px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px}
        .logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;text-decoration:none;color:var(--text)}
        .logo svg{width:28px;height:28px}
        .logo span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-stats{display:flex;gap:16px;flex-wrap:wrap}
        .top-stat{text-align:center}
        .top-stat .val{font-size:16px;font-weight:700;color:var(--accent)}
        .top-stat .lbl{font-size:11px;color:var(--muted)}
        .container{max-width:960px;margin:0 auto;padding:24px 16px 60px}
        .hero{text-align:center;padding:24px 0 32px}
        .hero h1{font-size:28px;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
        .hero p{font-size:14px;color:var(--text2)}
        .filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
        .filter-btn{padding:8px 16px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .2s}
        .filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(247,127,0,.06)}
        .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
        .table-header{display:grid;grid-template-columns:48px 1fr 120px 100px 80px;padding:12px 16px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--card2)}
        .row{display:grid;grid-template-columns:48px 1fr 120px 100px 80px;padding:14px 16px;align-items:center;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;text-decoration:none;color:inherit}
        .row:hover{background:rgba(247,127,0,.03)}
        .row:last-child{border-bottom:none}
        .rank{font-size:15px;font-weight:700;color:var(--muted);text-align:center}
        .rank.top1{color:var(--gold)}
        .rank.top2{color:#a8a8a8}
        .rank.top3{color:#cd7f32}
        .user-info{display:flex;align-items:center;gap:10px;min-width:0}
        .user-avatar{width:36px;height:36px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
        .user-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
        .user-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .user-plan{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:600;display:inline-block;margin-top:2px}
        .plan-pro{background:rgba(247,127,0,.12);color:var(--accent)}
        .plan-premium{background:rgba(234,179,8,.12);color:var(--gold)}
        .plan-doree{background:rgba(234,179,8,.2);color:#eab308}
        .mrr{font-size:15px;font-weight:700;color:var(--accent)}
        .revenue{font-size:13px;color:var(--text2)}
        .growth{font-size:13px;font-weight:600}
        .growth.up{color:var(--green)}
        .growth.down{color:var(--red)}
        .badge-gold{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(234,179,8,.15);color:var(--gold)}
        .loading{text-align:center;padding:60px 24px;color:var(--muted)}
        .loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .pagination{display:flex;justify-content:center;gap:8px;margin-top:20px}
        .page-btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .2s}
        .page-btn.active,.page-btn:hover{border-color:var(--accent);color:var(--accent)}
        .page-btn:disabled{opacity:.3;cursor:not-allowed}
        .footer{text-align:center;padding:24px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:40px}
        .footer a{color:var(--accent);text-decoration:none}
        @media(max-width:600px){
            .table-header,.row{grid-template-columns:36px 1fr 90px 70px}
            .revenue-col{display:none}
            .top-stat .val{font-size:13px}
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/" class="logo">
            <svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="url(#lg)"/><path d="M14 24h20M28 18l6 6-6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="lg" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#f77f00"/><stop offset="1" stop-color="#ff9f30"/></linearGradient></defs></svg>
            <span>Flay Business</span>
        </a>
        <div class="top-stats" id="topStats">
            <div class="top-stat"><div class="val" id="statUsers">-</div><div class="lbl">Utilisateurs</div></div>
            <div class="top-stat"><div class="val" id="statPaid">-</div><div class="lbl">Abonnes</div></div>
            <div class="top-stat"><div class="val" id="statRevenue">-</div><div class="lbl">Revenu total</div></div>
            <div class="top-stat"><div class="val" id="statMRR">-</div><div class="lbl">MRR Total</div></div>
        </div>
    </div>
    <div class="container">
        <div class="hero">
            <h1>Classement des revenus</h1>
            <p>Decouvrez les meilleures performances business sur Flay · MRR verifie</p>
        </div>
        <div class="filters" id="filters"></div>
        <div class="table-wrap">
            <div class="table-header">
                <span>#</span>
                <span>Entrepreneur</span>
                <span>MRR</span>
                <span class="revenue-col">Revenu</span>
                <span>Croissance</span>
            </div>
            <div id="leaderboardRows">
                <div class="loading"><div class="spinner"></div>Chargement du classement...</div>
            </div>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
    <div class="footer">
        <p>Donnees en temps reel · <a href="/">Flay</a> by <strong>DIGITALSTRATEGES</strong> &middot; Cote d'Ivoire 🇨🇮</p>
    </div>
    <script>
        let currentPage = 1;
        let currentPlan = 'all';

        async function load() {
            const [data, stats] = await Promise.all([
                fetch('/api/leaderboard?page=' + currentPage + '&limit=50').then(r => r.json()),
                fetch('/api/leaderboard/stats').then(r => r.json())
            ]);
            if (stats) {
                document.getElementById('statUsers').textContent = (stats.totalUsers || 0).toLocaleString();
                document.getElementById('statPaid').textContent = (stats.paidUsers || 0).toLocaleString();
                document.getElementById('statRevenue').textContent = formatMoney(stats.totalRevenue || 0);
                document.getElementById('statMRR').textContent = formatMoney(data.totalMRR || 0);
            }
            if (data) {
                renderFilters(data.topPlans || []);
                renderRows(data.leaderboard || []);
                renderPagination(data.page, data.pages);
            }
        }

        function renderFilters(plans) {
            const container = document.getElementById('filters');
            let html = '<div class="filter-btn' + (currentPlan === 'all' ? ' active' : '') + '" onclick="setFilter(\'all\')">Tous</div>';
            const labels = { pro: 'Pro', premium: 'Premium', doree: 'Doree' };
            plans.forEach(([plan, count]) => {
                if (plan === 'free') return;
                html += '<div class="filter-btn' + (currentPlan === plan ? ' active' : '') + '" onclick="setFilter(\'' + plan + '\')">' + (labels[plan] || plan) + ' (' + count + ')</div>';
            });
            container.innerHTML = html;
        }

        function setFilter(plan) {
            currentPlan = plan;
            currentPage = 1;
            load();
        }

        function renderRows(rows) {
            const container = document.getElementById('leaderboardRows');
            if (!rows.length) {
                container.innerHTML = '<div style="text-align:center;padding:40px 16px;color:var(--muted)"><div style="font-size:32px;margin-bottom:8px">📊</div><p>Aucune donnee pour le moment. Les premiers entrepreneurs apparaissent ici.</p></div>';
                return;
            }
            container.innerHTML = rows.map((r, i) => {
                const rankCls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
                const rankIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
                const planCls = 'plan-' + (r.plan || 'free');
                const growthCls = r.momGrowth >= 0 ? 'up' : 'down';
                const avatar = r.avatar || '';
                const initial = (r.name || '?')[0].toUpperCase();
                return '<a href="/u/' + r.slug + '" class="row">' +
                    '<div class="rank ' + rankCls + '">' + (rankIcon || (i + 1)) + '</div>' +
                    '<div class="user-info">' +
                    (avatar ? '<div class="user-avatar"><img src="' + avatar + '" alt=""></div>' : '<div class="user-avatar">' + initial + '</div>') +
                    '<div><div class="user-name">' + esc(r.name) + '</div><span class="user-plan ' + planCls + '">' + esc(r.planLabel || r.plan) + '</span></div></div>' +
                    '<div class="mrr">' + formatMoney(r.mrr) + '</div>' +
                    '<div class="revenue revenue-col">' + formatMoney(r.totalRevenue) + '</div>' +
                    '<div class="growth ' + growthCls + '">+' + r.momGrowth + '%</div></a>';
            }).join('');
        }

        function renderPagination(page, pages) {
            const container = document.getElementById('pagination');
            if (pages <= 1) return container.innerHTML = '';
            let html = '<button class="page-btn" onclick="goPage(' + (page - 1) + ')" ' + (page <= 1 ? 'disabled' : '') + '>←</button>';
            for (let i = Math.max(1, page - 2); i <= Math.min(pages, page + 2); i++) {
                html += '<button class="page-btn' + (i === page ? ' active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
            }
            html += '<button class="page-btn" onclick="goPage(' + (page + 1) + ')" ' + (page >= pages ? 'disabled' : '') + '>→</button>';
            container.innerHTML = html;
        }

        function goPage(p) { currentPage = p; load(); window.scrollTo(0, 0); }
        function formatMoney(n) { return (n || 0).toLocaleString() + ' F'; }
        function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
        load();
    </script>
</body>
</html>
