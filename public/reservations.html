<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reservations - Flay</title><link rel="icon" href="/favicon.svg"><link rel="manifest" href="/manifest.json"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}body.light{--bg:#f8f9fa;--text:#111;--card:#fff;--border:#e2e8f0;--muted:#64748b;--primary:#6366f1;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--sidebar-bg:#fff;--sidebar-hover:#f1f5f9}body.dark{--bg:#0a0a1a;--text:#e2e8f0;--card:#12121f;--border:#1e1e33;--muted:#94a3b8;--primary:#818cf8;--success:#34d399;--danger:#f87171;--warning:#fbbf24;--sidebar-bg:#0f0f1e;--sidebar-hover:#1a1a30}.layout{display:flex;min-height:100vh}.sidebar{width:260px;background:var(--sidebar-bg);border-right:1px solid var(--border);padding:20px;display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto;z-index:100}.sidebar-logo{display:flex;align-items:center;gap:12px;margin-bottom:30px;padding:0 8px}.sidebar-logo svg{width:36px;height:36px}.sidebar-logo h2{font-size:20px;background:linear-gradient(135deg,var(--primary),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sidebar-nav{flex:1}.nav-section{margin-bottom:24px}.nav-section-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);padding:0 12px;margin-bottom:8px}.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);cursor:pointer;transition:.15s;font-size:14px;text-decoration:none}.nav-item:hover{background:var(--sidebar-hover);color:var(--text)}.nav-item.active{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.1));color:var(--primary);font-weight:600}.nav-item svg{width:18px;height:18px;flex-shrink:0}.main{flex:1;margin-left:260px;padding:24px}.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.header h1{font-size:24px}.btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.3)}.btn-secondary{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text)}.btn-secondary:hover{background:rgba(255,255,255,.1)}.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444}.btn-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#10b981}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.card-title{font-size:16px;font-weight:700}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}.stat-card .label{font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}.stat-card .value{font-size:28px;font-weight:800}.stat-card .change{font-size:12px;margin-top:4px}.stat-card .change.up{color:var(--success)}.stat-card .change.down{color:var(--danger)}.tabs{display:flex;gap:4px;margin-bottom:20px;background:rgba(255,255,255,.03);padding:4px;border-radius:12px}.tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s;border:none;background:none}.tab.active{background:var(--primary);color:#fff}.tab:hover:not(.active){color:var(--text)}.table-container{overflow-x:auto}table{width:100%;border-collapse:collapse}th{text-align:left;padding:12px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border)}td{padding:12px;font-size:14px;border-bottom:1px solid rgba(255,255,255,.03)}tr:hover td{background:rgba(255,255,255,.02)}.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}.badge-success{background:rgba(16,185,129,.15);color:#10b981}.badge-danger{background:rgba(239,68,68,.15);color:#ef4444}.badge-warning{background:rgba(245,158,11,.15);color:#f59e0b}.badge-info{background:rgba(99,102,241,.15);color:#818cf8}.badge-neutral{background:rgba(255,255,255,.08);color:var(--muted)}.search-bar{position:relative;margin-bottom:16px}.search-bar input{width:100%;padding:10px 16px 10px 40px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px}.search-bar input:focus{border-color:var(--primary);outline:none}.search-bar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}.empty-state svg{margin-bottom:16px;opacity:.5}.empty-state h3{font-size:16px;margin-bottom:8px;color:var(--text)}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}.calendar-header{font-size:11px;text-align:center;color:var(--muted);padding:8px 0;font-weight:600}.calendar-day{padding:8px;text-align:center;border-radius:8px;font-size:13px;cursor:pointer;transition:.15s;position:relative}.calendar-day:hover{background:rgba(99,102,241,.1)}.calendar-day.today{background:var(--primary);color:#fff;font-weight:700}.calendar-day.has-reservation::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--success)}.calendar-day.other-month{color:var(--muted);opacity:.4}.day-detail{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px}..day-detail h3{font-size:14px;margin-bottom:8px}..res-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}.res-item:last-child{border:none}.res-time{font-weight:700;color:var(--primary);min-width:50px}.res-info{flex:1;margin-left:12px}.res-info .name{font-weight:600;font-size:14px}.res-info .detail{font-size:12px;color:var(--muted)}.calendar-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.calendar-nav h3{font-size:16px}.calendar-nav button{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 12px;cursor:pointer;font-size:13px}.calendar-nav button:hover{background:rgba(255,255,255,.05)}@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.stats-grid{grid-template-columns:1fr 1fr}.calendar-grid{gap:2px}.calendar-day{padding:4px;font-size:11px}}</style></head><body class="dark"><div class="layout"><aside class="sidebar"><div class="sidebar-logo"><svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="#6366f1"/><path d="M14 24h20M28 18l6 6-6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg><h2>Flay</h2></div><nav class="sidebar-nav"><div class="nav-section"><div class="nav-section-title">Navigation</div><a href="/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a><a href="/editor.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editeur</a><a href="/analytics.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Analytics</a><a href="/visitors.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Visiteurs</a><a href="/crm.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>CRM</a></div><div class="nav-section"><div class="nav-section-title">Admin</div><a href="/admin.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>Paiements</a><a href="/reservations.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Reservations</a><a href="/settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Parametres</a></div></nav></aside><main class="main"><div class="header"><h1>Reservations</h1><div class="header-actions"><button class="btn btn-secondary" onclick="exportReservations()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Exporter</button></div></div><div class="stats-grid" id="statsGrid"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px"><div class="card"><div class="card-header"><span class="card-title">Calendrier</span></div><div class="calendar-nav"><button onclick="changeMonth(-1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button><h3 id="calendarTitle"></h3><button onclick="changeMonth(1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button></div><div class="calendar-grid" id="calendarGrid"></div><div class="day-detail" id="dayDetail" style="display:none"><h3 id="dayDetailTitle"></h3><div id="dayDetailList"></div></div></div><div class="card" style="grid-column:1/-1"><div class="card-header"><span class="card-title" id="listTitle">Toutes les reservations</span></div><div class="search-bar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input type="text" id="searchInput" placeholder="Rechercher par nom, email, service..." oninput="filterReservations()"></div><div class="tabs"><button class="tab active" onclick="switchTab('all',this)">Toutes</button><button class="tab" onclick="switchTab('confirmed',this)">Confirmees</button><button class="tab" onclick="switchTab('pending',this)">En attente</button><button class="tab" onclick="switchTab('cancelled',this)">Annulees</button></div><div class="table-container"><table><thead><tr><th>Client</th><th>Service</th><th>Date</th><th>Heure</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="resBody"></tbody></table></div><div class="empty-state" id="emptyState" style="display:none"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><h3>Aucune reservation</h3><p>Aucune reservation enregistree.</p></div></div></div></main></div><script>let allRes=[];let filteredRes=[];let calMonth=new Date().getMonth();let calYear=new Date().getFullYear();let selectedDate=null;async function init(){try{const r=await fetch('/api/reservations',{headers:{'Authorization':'Bearer '+localStorage.getItem('flay_token')}});const d=await r.json();allRes=d.reservations||d.data||[]}catch(e){allRes=[]}filteredRes=[...allRes];renderStats();renderCalendar();renderTable();}function renderStats(){const total=allRes.length;const confirmed=allRes.filter(r=>r.status==='confirmed').length;const pending=allRes.filter(r=>r.status==='pending').length;const today=allRes.filter(r=>{const d=new Date(r.date);const n=new Date();return d.toDateString()===n.toDateString()}).length;document.getElementById('statsGrid').innerHTML=`<div class="stat-card"><div class="label">Total reservations</div><div class="value">${total}</div></div><div class="stat-card"><div class="label">Confirmees</div><div class="value" style="color:var(--success)">${confirmed}</div></div><div class="stat-card"><div class="label">En attente</div><div class="value" style="color:var(--warning)">${pending}</div></div><div class="stat-card"><div class="label">Aujourd'hui</div><div class="value" style="color:var(--primary)">${today}</div></div>`;}function renderCalendar(){const title=document.getElementById('calendarTitle');const grid=document.getElementById('calendarGrid');const months=['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];title.textContent=months[calMonth]+' '+calYear;const firstDay=new Date(calYear,calMonth,1).getDay();const daysInMonth=new Date(calYear,calMonth+1,0).getDate();const daysInPrev=new Date(calYear,calMonth,0).getDate();const today=new Date();let html='';['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'].forEach(d=>{html+=`<div class="calendar-header">${d}</div>`});for(let i=firstDay-1;i>=0;i--){html+=`<div class="calendar-day other-month">${daysInPrev-i}</div>`;}for(let d=1;d<=daysInMonth;d++){const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const isToday=d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();const hasRes=allRes.some(r=>r.date===dateStr||r.date?.startsWith(dateStr));const classes=['calendar-day'];if(isToday)classes.push('today');if(hasRes)classes.push('has-reservation');if(selectedDate===dateStr)classes.push('selected');html+=`<div class="${classes.join(' ')}" onclick="selectDay('${dateStr}',${d})">${d}</div>`;}const remaining=7-((firstDay+daysInMonth)%7);if(remaining<7)for(let i=1;i<=remaining;i++)html+=`<div class="calendar-day other-month">${i}</div>`;grid.innerHTML=html;}function changeMonth(delta){calMonth+=delta;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderCalendar();}function selectDay(dateStr,day){selectedDate=dateStr;const detail=document.getElementById('dayDetail');const title=document.getElementById('dayDetailTitle');const list=document.getElementById('dayDetailList');const dayRes=allRes.filter(r=>r.date===dateStr);title.textContent=`Reservations du ${day} ${['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'][calMonth]}`;if(!dayRes.length){list.innerHTML='<p style="color:var(--muted);font-size:13px">Aucune reservation ce jour</p>'}else{list.innerHTML=dayRes.map(r=>`<div class="res-item"><span class="res-time">${r.time||r.hour||'--:--'}</span><div class="res-info"><div class="name">${r.clientName||r.name||r.client||'Client'}</div><div class="detail">${r.service||r.type||''} - ${r.email||r.clientEmail||''}</div></div><span class="badge badge-${r.status==='confirmed'?'success':r.status==='cancelled'?'danger':'warning'}">${r.status==='confirmed'?'Confirme':r.status==='cancelled'?'Annule':'En attente'}</span></div>`).join('')}detail.style.display='block';renderCalendar();}function switchTab(status,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');if(status==='all')filteredRes=[...allRes];else filteredRes=allRes.filter(r=>r.status===status);renderTable();}function filterReservations(){const q=document.getElementById('searchInput').value.toLowerCase();filteredRes=allRes.filter(r=>{if(q&&!(r.clientName||r.name||r.client||'').toLowerCase().includes(q)&&!(r.email||r.clientEmail||'').toLowerCase().includes(q)&&!(r.service||r.type||'').toLowerCase().includes(q))return false;return true});renderTable();}function renderTable(){const body=document.getElementById('resBody');const empty=document.getElementById('emptyState');document.getElementById('listTitle').textContent=`${filteredRes.length} reservation${filteredRes.length!==1?'s':''}`;if(!filteredRes.length){body.innerHTML='';empty.style.display='block';return}empty.style.display='none';body.innerHTML=filteredRes.map(r=>`<tr><td><div style="font-weight:600">${r.clientName||r.name||r.client||'Client'}</div><div style="font-size:12px;color:var(--muted)">${r.email||r.clientEmail||''}</div></td><td>${r.service||r.type||'-'}</td><td>${r.date||'-'}</td><td>${r.time||r.hour||'-'}</td><td><span class="badge badge-${r.status==='confirmed'?'success':r.status==='cancelled'?'danger':'warning'}">${r.status==='confirmed'?'Confirme':r.status==='cancelled'?'Annule':'En attente'}</span></td><td>${r.status==='pending'?`<button class="btn btn-success" style="padding:4px 10px;font-size:11px" onclick="confirmRes('${r.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></button><button class="btn btn-danger" style="padding:4px 10px;font-size:11px" onclick="cancelRes('${r.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`:'-'}</td></tr>`).join('');}async function confirmRes(id){try{await fetch('/api/reservations/'+id+'/status',{method:'PUT',headers:{'Authorization':'Bearer '+localStorage.getItem('flay_token'),'Content-Type':'application/json'},body:JSON.stringify({status:'confirmed'})});const r=allRes.find(x=>x.id===id);if(r)r.status='confirmed';renderStats();renderTable();renderCalendar()}catch(e){alert('Erreur: '+e.message)}}async function cancelRes(id){if(!confirm('Annuler cette reservation ?'))return;try{await fetch('/api/reservations/'+id+'/status',{method:'PUT',headers:{'Authorization':'Bearer '+localStorage.getItem('flay_token'),'Content-Type':'application/json'},body:JSON.stringify({status:'cancelled'})});const r=allRes.find(x=>x.id===id);if(r)r.status='cancelled';renderStats();renderTable();renderCalendar()}catch(e){alert('Erreur: '+e.message)}}function exportReservations(){const csv=[['Client','Email','Service','Date','Heure','Statut']].concat(filteredRes.map(r=>[r.clientName||r.name||r.client||'',r.email||r.clientEmail||'',r.service||r.type||'',r.date||'',r.time||r.hour||'',r.status||'']])).map(r=>r.join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='flay-reservations.csv';a.click();URL.revokeObjectURL(url);}init();</script></body></html>
