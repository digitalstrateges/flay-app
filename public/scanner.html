<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Scanner QR | Flay</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f77f00">
<style>
:root{--bg:#0f0a05;--bg2:#1a150a;--card:#2a2010;--border:#4a3820;--accent:#f77f00;--accent2:#e07000;--text:#f0e6d0;--text2:#b8a880;--muted:#8a7a60;--gradient:linear-gradient(135deg,#f77f00,#ff9f30)}
.light{--bg:#faf6f0;--bg2:#fff0e0;--card:#ffffff;--border:#e0d5c5;--accent:#e07000;--accent2:#f77f00;--text:#1a150a;--text2:#6b5c45;--muted:#8a7a60;--gradient:linear-gradient(135deg,#e07000,#f77f00)}
@media(prefers-color-scheme:light){:root{--bg:#faf6f0;--bg2:#fff0e0;--card:#ffffff;--border:#e0d5c5;--accent:#e07000;--accent2:#f77f00;--text:#1a150a;--text2:#6b5c45;--muted:#8a7a60;--gradient:linear-gradient(135deg,#e07000,#f77f00)}.light{--bg:#0f0a05;--bg2:#1a150a;--card:#2a2010;--border:#4a3820;--accent:#f77f00;--accent2:#e07000;--text:#f0e6d0;--text2:#b8a880;--muted:#8a7a60;--gradient:linear-gradient(135deg,#f77f00,#ff9f30)}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header h1{font-size:17px;font-weight:600;flex:1;color:var(--text)}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text2);text-decoration:none;font-size:14px;padding:10px 12px;border-radius:8px;transition:all .2s;min-height:44px;-webkit-tap-highlight-color:transparent}
.back-btn:active{background:rgba(255,255,255,.06);color:var(--text)}
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.scanner-container{width:100%;max-width:360px;aspect-ratio:1;background:var(--card);border-radius:20px;overflow:hidden;position:relative;border:2px solid var(--border)}
#scanner{width:100%;height:100%;object-fit:cover}
.scanner-frame{position:absolute;inset:15%;border:2px solid var(--accent);border-radius:16px;pointer-events:none;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
.scanner-frame::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scan 2s ease-in-out infinite}
@keyframes scan{0%,100%{top:0}50%{top:calc(100% - 3px)}}
.scanner-hint{text-align:center;margin-top:20px;color:var(--text2);font-size:14px;line-height:1.6}
.scanner-hint strong{color:var(--text)}
.manual-input{width:100%;max-width:400px;margin-top:24px}
.manual-input label{display:block;font-size:14px;color:var(--text2);margin-bottom:8px}
.input-group{display:flex;gap:8px}
.input-group input{flex:1;padding:14px 16px;min-height:48px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;outline:none;transition:border .2s}
.input-group input:focus{border-color:var(--accent)}
.input-group button{padding:14px 24px;min-height:48px;background:var(--gradient);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:15px;cursor:pointer;transition:all .2s;font-family:inherit;-webkit-tap-highlight-color:transparent}
.input-group button:active{transform:scale(.97)}
.result-card{display:none;width:100%;max-width:400px;margin-top:24px;background:var(--card);border-radius:16px;padding:24px;border:1px solid var(--border);text-align:center}
.result-card .icon{font-size:48px;margin-bottom:12px}
.result-card h3{font-size:18px;margin-bottom:4px;color:var(--text)}
.result-card p{color:var(--text2);font-size:14px;margin-bottom:16px;word-break:break-all;line-height:1.5}
.result-card .btn{display:inline-block;padding:14px 32px;min-height:48px;background:var(--gradient);color:#fff;border-radius:10px;text-decoration:none;font-weight:600;font-size:15px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.result-card .btn:active{transform:scale(.97)}
.error-msg{color:#f87171;font-size:14px;margin-top:8px;display:none}
.camera-select{margin-top:16px;display:flex;gap:8px;justify-content:center}
.camera-btn{padding:10px 16px;min-height:44px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;cursor:pointer;transition:all .2s;font-family:inherit;-webkit-tap-highlight-color:transparent}
.camera-btn.active,.camera-btn:active{background:var(--accent);border-color:var(--accent);color:#fff}
.flash-btn{position:absolute;top:16px;right:16px;z-index:5;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.flash-btn:active{background:rgba(247,127,0,.3);border-color:var(--accent)}
@media(hover:none){
.camera-btn:hover{background:transparent;border-color:var(--border);color:var(--text2)}
.camera-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.back-btn:hover{background:transparent;color:var(--text2)}
.input-group button:hover{opacity:1}
.result-card .btn:hover{opacity:1}
.flash-btn:hover{background:rgba(0,0,0,.6);border-color:var(--border)}
}
@media(max-width:480px){
.header{padding:8px 12px}
.header h1{font-size:15px}
.main{padding:16px 12px}
.scanner-container{border-radius:16px}
.scanner-hint{font-size:13px}
.manual-input label{font-size:13px}
.input-group input{padding:12px 14px;font-size:15px}
.result-card{padding:20px}
.camera-btn{font-size:13px;padding:8px 14px}
}
</style>
</head>
<body>
<div class="header">
  <a href="/" class="back-btn">&#8592; Retour</a>
  <h1>Scanner QR Code</h1>
</div>
<div class="main">
  <div class="scanner-container" id="scannerContainer">
    <video id="scanner" autoplay playsinline muted></video>
    <div class="scanner-frame"></div>
    <button class="flash-btn" id="flashBtn" onclick="toggleFlash()">&#9889;</button>
  </div>
  <div class="camera-select">
    <button class="camera-btn active" onclick="switchCamera('environment')">Arriere</button>
    <button class="camera-btn" onclick="switchCamera('user')">Avant</button>
  </div>
  <div class="scanner-hint">
    Pointez l'appareil vers un <strong>QR Code Flay</strong><br>
    pour voir le profil ou le produit
  </div>
  <div class="manual-input">
    <label>Ou entrez le lien manuellement</label>
    <div class="input-group">
      <input type="url" id="manualUrl" placeholder="https://flay.app/u/...">
      <button onclick="openManual()">OK</button>
    </div>
    <div class="error-msg" id="errorMsg">Lien invalide</div>
  </div>
  <div class="result-card" id="resultCard">
    <div class="icon" id="resultIcon">&#128197;</div>
    <h3 id="resultTitle">Profil trouve</h3>
    <p id="resultUrl">flay.app/u/...</p>
    <a href="#" id="resultBtn" class="btn">Voir le profil</a>
  </div>
</div>
<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
const video = document.getElementById('scanner');
const resultCard = document.getElementById('resultCard');
const errorMsg = document.getElementById('errorMsg');
let stream = null;
let facingMode = 'environment';
let scanning = true;
async function startScanner(facing = 'environment') {
  scanning = true;
  if (stream) { stream.getTracks().forEach(t => t.stop()); }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = stream;
    video.play();
    scanFrame();
  } catch (e) {
    document.getElementById('scannerContainer').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:14px;text-align:center;padding:32px">' +
      'Camera non disponible.<br>Utilisez la saisie manuelle ci-dessous.</div>';
  }
}
function scanFrame() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
    if (code) {
      handleScan(code.data);
      return;
    }
  }
  requestAnimationFrame(scanFrame);
}
function handleScan(data) {
  if (!data) return;
  scanning = false;
  if (stream) { stream.getTracks().forEach(t => t.stop()); }
  const url = data.startsWith('http') ? data : 'https://' + data;
  const u = new URL(url);
  const path = u.pathname;
  let title = 'Profil Flay';
  let icon = '&#128100;';
  let link = url;
  if (path.includes('/u/') || path.includes('/p/') || path.startsWith('/showcase/')) {
    title = 'Carte de visite Flay';
    icon = '&#128100;';
  } else if (path.includes('/product/') || path.includes('/store/')) {
    title = 'Produit / Boutique';
    icon = '&#128722;';
  } else if (path.includes('/track/')) {
    title = 'Suivi de colis';
    icon = '&#128230;';
  } else {
    title = 'Lien Flay';
  }
  showResult(title, icon, url, url);
}
function showResult(title, icon, displayUrl, linkUrl) {
  document.getElementById('resultIcon').innerHTML = icon;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultUrl').textContent = displayUrl;
  document.getElementById('resultBtn').href = linkUrl;
  resultCard.style.display = 'block';
  resultCard.scrollIntoView({ behavior: 'smooth' });
}
function openManual() {
  const input = document.getElementById('manualUrl').value.trim();
  if (!input) { errorMsg.style.display = 'block'; return; }
  errorMsg.style.display = 'none';
  try {
    const url = input.startsWith('http') ? new URL(input) : new URL('https://' + input);
    handleScan(url.href);
  } catch(e) {
    errorMsg.style.display = 'block';
  }
}
function switchCamera(mode) {
  facingMode = mode;
  document.querySelectorAll('.camera-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(mode === 'environment' ? 'Arriere' : 'Avant')));
  startScanner(mode);
}
async function toggleFlash() {
  if (!stream) return;
  const track = stream.getVideoTracks()[0];
  try {
    await track.applyConstraints({ advanced: [{ torch: !track.getSettings().torch }] });
  } catch(e) {}
}
startScanner();
document.getElementById('manualUrl').addEventListener('keydown', e => { if(e.key === 'Enter') openManual(); });
</script>
</body>
</html>
