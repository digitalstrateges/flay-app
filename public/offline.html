<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flay - Hors ligne</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#818cf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg">
    <link rel="icon" type="image/svg+xml" href="/logo-animated.svg">
    <script src="/pwa.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#f1f5f9;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
        .container{text-align:center;padding:32px;max-width:400px;animation:fadeUp .6s ease-out}
        .logo{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#818cf8,#c084fc);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 8px 32px rgba(129,140,248,.25)}
        .logo svg{width:44px;height:44px}
        h1{font-size:24px;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        p{font-size:15px;color:#94a3b8;line-height:1.6;margin-bottom:8px}
        .sub{font-size:13px;color:#64748b;margin-bottom:32px}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:linear-gradient(135deg,#818cf8,#c084fc);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .25s;font-family:inherit;box-shadow:0 4px 20px rgba(129,140,248,.3)}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(129,140,248,.45)}
        .btn:active{transform:translateY(0);box-shadow:0 2px 12px rgba(129,140,248,.2)}
        .icon-wifi{width:64px;height:64px;margin:0 auto 20px;color:#64748b;opacity:.5}
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#f87171;animation:pulse 2s infinite;margin-right:6px;vertical-align:middle}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="#fff"/><path d="M14 24h20M28 18l6 6-6 6" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <svg class="icon-wifi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/><path d="M8.53 16.11a6 6 0 016.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        <h1>Vous etes hors ligne</h1>
        <p>Reconnectez-vous pour continuer</p>
        <div class="sub"><span class="dot"></span>Aucune connexion Internet detectee</div>
        <button class="btn" onclick="window.location.reload()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
            Reessayer
        </button>
    </div>
</body>
</html>
