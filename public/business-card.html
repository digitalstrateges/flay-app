<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flay - Carte de Visite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#818cf8">
    <link rel="icon" type="image/svg+xml" href="/logo-animated.svg">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#08081a;--card:#111125;--card2:#1a1a33;--border:#1e1e38;--accent:#818cf8;--accent2:#a78bfa;--text:#f1f5f9;--muted:#64748b;--radius:12px}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(129,140,248,0.4)}50%{box-shadow:0 0 0 12px rgba(129,140,248,0)}}

        .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
        .topbar-brand{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .topbar-nav{display:flex;gap:6px}
        .topbar-nav a{padding:8px 14px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;transition:all 0.2s}
        .topbar-nav a:hover,.topbar-nav a.active{color:var(--text);background:rgba(129,140,248,0.1)}

        .layout{display:grid;grid-template-columns:320px 1fr;gap:0;min-height:calc(100vh - 56px)}
        @media(max-width:900px){.layout{grid-template-columns:1fr}}

        /* ===== SIDEBAR (controls) ===== */
        .sidebar{padding:20px;background:var(--bg);border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 56px)}
        @media(max-width:900px){.sidebar{max-height:none;border-right:none;border-bottom:1px solid var(--border)}}
        .sidebar h2{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .sidebar-section{margin-bottom:20px;animation:fadeUp 0.4s ease-out both}
        .sidebar-section:nth-child(1){animation-delay:0s}
        .sidebar-section:nth-child(2){animation-delay:0.05s}
        .sidebar-section:nth-child(3){animation-delay:0.1s}
        .sidebar-section:nth-child(4){animation-delay:0.15s}
        .sidebar-section:nth-child(5){animation-delay:0.2s}
        .sidebar-section:nth-child(6){animation-delay:0.25s}
        .sidebar-section:nth-child(7){animation-delay:0.3s}
        .sidebar-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
        .form-group{margin-bottom:10px}
        .form-group label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:3px}
        .form-group input,.form-group select{width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border 0.2s}
        .form-group input:focus,.form-group select:focus{border-color:var(--accent)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

        .color-row{display:flex;gap:8px;align-items:center}
        .color-row input[type=color]{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;padding:2px}
        .color-row input[type=text]{flex:1;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:monospace;outline:none}
        .color-row input[type=text]:focus{border-color:var(--accent)}

        .toggle-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
        .toggle-row label{font-size:13px;cursor:pointer}
        .toggle{width:40px;height:22px;border-radius:11px;background:var(--border);cursor:pointer;position:relative;transition:all 0.2s;flex-shrink:0}
        .toggle.on{background:var(--accent)}
        .toggle:after{content:'';width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:all 0.2s}
        .toggle.on:after{left:20px}

        .actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit;flex:1}
        .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(129,140,248,0.3)}
        .btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
        .btn-secondary:hover{background:var(--card2)}
        .btn-success{background:#10b981;color:#fff}
        .btn-success:hover{background:#059669}

        /* ===== PREVIEW ===== */
        .preview-area{display:flex;align-items:center;justify-content:center;padding:40px;background:radial-gradient(ellipse at center,var(--card) 0%,var(--bg) 70%);perspective:1000px;min-height:calc(100vh - 56px);overflow:hidden}
        @media(max-width:900px){.preview-area{min-height:60vh;padding:20px}}

        .card-3d{transform-style:preserve-3d;transition:transform 0.1s ease-out;width:100%;max-width:400px;position:relative;cursor:default}
        .card-face{width:100%;aspect-ratio:1.585;border-radius:16px;padding:32px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(129,140,248,0.05)}
        .card-face:after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 50%,rgba(0,0,0,0.1) 100%);pointer-events:none}
        .card-qr{position:absolute;bottom:16px;right:16px;width:60px;height:60px;background:#fff;border-radius:8px;padding:4px;display:flex;align-items:center;justify-content:center;z-index:2;opacity:0.9}
        .card-qr img{width:100%;height:100%;display:block}
        .card-logo-area{position:absolute;top:16px;left:16px;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;z-index:2;opacity:0.9}
        .card-name{font-size:clamp(18px,3.5vw,26px);font-weight:800;line-height:1.2;z-index:2;position:relative}
        .card-title{font-size:clamp(11px,2vw,14px);font-weight:500;z-index:2;position:relative;opacity:0.75;margin-top:2px}
        .card-contact{display:flex;gap:12px;flex-wrap:wrap;z-index:2;position:relative;margin-top:auto}
        .card-contact-item{font-size:clamp(10px,1.5vw,12px);display:flex;align-items:center;gap:4px;opacity:0.7}
        .card-footer{display:flex;justify-content:space-between;align-items:flex-end;z-index:2;position:relative;margin-top:12px}
        .card-brand{font-size:9px;text-transform:uppercase;letter-spacing:1px;opacity:0.35}

        /* QR container on side for print */
        .print-only{display:none}
        @media print{body{background:#fff}.sidebar,.topbar,.chat-toggle{display:none!important}.preview-area{min-height:100vh;padding:0;background:#fff}.card-3d{transform:none!important;max-width:95mm}.card-face{box-shadow:none;aspect-ratio:1.585;border:1px solid #ddd;border-radius:8px}.print-only{display:block;position:absolute;top:-9999px}}

        /* Toast */
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:14px;z-index:100;opacity:0;transition:all 0.3s;pointer-events:none;background:var(--card);border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
        .toast.show{opacity:1}
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-brand">Flay Studio</div>
        <div class="topbar-nav">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/editor.html">Editeur</a>
            <a href="/studio.html">Studio</a>
            <a href="/business-card.html" class="active">Carte</a>
        </div>
    </div>

    <div class="layout">
        <!-- Controls -->
        <div class="sidebar" id="controls">
            <h2>&#128393; Personnalisation</h2>

            <div class="sidebar-section">
                <div class="sidebar-label">Infos</div>
                <div class="form-group"><label>Nom</label><input type="text" id="cardName" value="Votre Nom" oninput="updateCard()"></div>
                <div class="form-row">
                    <div class="form-group"><label>Titre</label><input type="text" id="cardTitle" value="Titre / Poste" oninput="updateCard()"></div>
                    <div class="form-group"><label>Initiales</label><input type="text" id="cardInitials" value="VN" maxlength="3" oninput="updateCard()"></div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Couleurs</div>
                <div class="form-group"><label>Fond</label><div class="color-row"><input type="color" id="bgColor" value="#818cf8" oninput="updateCard()"><input type="text" value="#818cf8" id="bgColorText" oninput="document.getElementById('bgColor').value=this.value;updateCard()"></div></div>
                <div class="form-group"><label>Texte</label><div class="color-row"><input type="color" id="textColor" value="#ffffff" oninput="updateCard()"><input type="text" value="#ffffff" id="textColorText" oninput="document.getElementById('textColor').value=this.value;updateCard()"></div></div>
                <div class="form-group"><label>Accent</label><div class="color-row"><input type="color" id="accentColor" value="#c4b5fd" oninput="updateCard()"><input type="text" value="#c4b5fd" id="accentColorText" oninput="document.getElementById('accentColor').value=this.value;updateCard()"></div></div>
                <div class="form-row">
                    <div class="form-group"><label>Style</label><select id="cardStyle" onchange="updateCard()"><option value="gradient">Gradient</option><option value="solid">Uni</option><option value="glass">Glassmorphisme</option><option value="border">Bordure</option></select></div>
                    <div class="form-group"><label>Police</label><select id="cardFont" onchange="updateCard()"><option value="'Inter',sans-serif">Inter</option><option value="'Georgia',serif">Georgia</option><option value="'Courier New',monospace">Monospace</option><option value="'Trebuchet MS',sans-serif">Trebuchet</option></select></div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Visibilite</div>
                <div class="toggle-row"><label>Afficher telephone</label><div class="toggle on" id="togglePhone" onclick="this.classList.toggle('on');updateCard()"></div></div>
                <div class="toggle-row"><label>Afficher email</label><div class="toggle on" id="toggleEmail" onclick="this.classList.toggle('on');updateCard()"></div></div>
                <div class="toggle-row"><label>Afficher QR code</label><div class="toggle on" id="toggleQR" onclick="this.classList.toggle('on');updateCard()"></div></div>
                <div class="toggle-row"><label>Afficher logo</label><div class="toggle on" id="toggleLogo" onclick="this.classList.toggle('on');updateCard()"></div></div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Contact</div>
                <div class="form-group"><label>Telephone</label><input type="text" id="cardPhone" value="+225 01 02 03 04" oninput="updateCard()"></div>
                <div class="form-group"><label>Email</label><input type="text" id="cardEmail" value="contact@exemple.com" oninput="updateCard()"></div>
                <div class="form-group"><label>Lien (QR)</label><input type="text" id="cardUrl" value="flay.ci/p/votreprofil" oninput="updateCard()"></div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Actions</div>
                <div class="actions">
                    <button class="btn btn-success" onclick="saveCard()">&#128190; Sauvegarder</button>
                    <button class="btn btn-primary" onclick="window.print()">&#128424; Imprimer</button>
                </div>
                <div style="margin-top:8px">
                    <button class="btn btn-secondary" onclick="resetCard()" style="flex:none;width:100%">&#8634; Reinitialiser</button>
                </div>
            </div>
        </div>

        <!-- 3D Preview -->
        <div class="preview-area" id="previewArea">
            <div class="card-3d" id="card3d">
                <div class="card-face" id="cardFace">
                    <div class="card-logo-area" id="cardLogo">F</div>
                    <div style="flex:1"></div>
                    <div class="card-name" id="cardNameDisplay">Votre Nom</div>
                    <div class="card-title" id="cardTitleDisplay">Titre / Poste</div>
                    <div class="card-contact" id="cardContact">
                        <span class="card-contact-item" id="phoneDisplay">&#128222; +225 01 02 03 04</span>
                        <span class="card-contact-item" id="emailDisplay">&#9993; contact@exemple.com</span>
                    </div>
                    <div class="card-footer">
                        <span class="card-brand">FLAY</span>
                        <span></span>
                    </div>
                    <div class="card-qr" id="qrDisplay">
                        <img src="" alt="QR" id="qrImage">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const token=localStorage.getItem('flay_token');
        if(!token)window.location.href='/login.html';

        function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

        // 3D tilt
        const area=document.getElementById('previewArea');
        const card=document.getElementById('card3d');
        area.addEventListener('mousemove',e=>{
            const rect=area.getBoundingClientRect();
            const x=(e.clientX-rect.left)/rect.width-0.5;
            const y=(e.clientY-rect.top)/rect.height-0.5;
            card.style.transform='rotateY('+(x*15)+'deg) rotateX('+(-y*12)+'deg) translateZ(20px)';
        });
        area.addEventListener('mouseleave',()=>{card.style.transform='rotateY(0deg) rotateX(0deg) translateZ(0px)'});
        area.addEventListener('touchmove',e=>{
            const touch=e.touches[0];
            const rect=area.getBoundingClientRect();
            const x=(touch.clientX-rect.left)/rect.width-0.5;
            const y=(touch.clientY-rect.top)/rect.height-0.5;
            card.style.transform='rotateY('+(x*12)+'deg) rotateX('+(-y*10)+'deg) translateZ(10px)';
        },{passive:true});
        area.addEventListener('touchend',()=>{card.style.transform='rotateY(0deg) rotateX(0deg) translateZ(0px)'});

        function updateCard(){
            const face=document.getElementById('cardFace');
            const bg=document.getElementById('bgColor').value;
            const text=document.getElementById('textColor').value;
            const accent=document.getElementById('accentColor').value;
            const font=document.getElementById('cardFont').value;
            const style=document.getElementById('cardStyle').value;
            const showPhone=document.getElementById('togglePhone').classList.contains('on');
            const showEmail=document.getElementById('toggleEmail').classList.contains('on');
            const showQR=document.getElementById('toggleQR').classList.contains('on');
            const showLogo=document.getElementById('toggleLogo').classList.contains('on');

            document.getElementById('cardNameDisplay').textContent=document.getElementById('cardName').value;
            document.getElementById('cardTitleDisplay').textContent=document.getElementById('cardTitle').value;
            document.getElementById('cardLogo').textContent=document.getElementById('cardInitials').value;
            document.getElementById('cardLogo').style.display=showLogo?'flex':'none';

            const phoneEl=document.getElementById('phoneDisplay');
            const emailEl=document.getElementById('emailDisplay');
            phoneEl.style.display=showPhone?'flex':'none';
            emailEl.style.display=showEmail?'flex':'none';
            phoneEl.innerHTML='&#128222; '+document.getElementById('cardPhone').value;
            emailEl.innerHTML='&#9993; '+document.getElementById('cardEmail').value;

            document.getElementById('qrDisplay').style.display=showQR?'flex':'none';

            // Background style
            face.style.fontFamily=font;
            switch(style){
                case 'gradient':face.style.background='linear-gradient(135deg,'+bg+','+adjustColor(bg,-30)+')';face.style.border='none';face.style.backdropFilter='none';break;
                case 'solid':face.style.background=bg;face.style.border='none';face.style.backdropFilter='none';break;
                case 'glass':face.style.background='rgba('+hexToRgb(bg)+',0.7)';face.style.backdropFilter='blur(12px)';face.style.border='1px solid rgba(255,255,255,0.15)';break;
                case 'border':face.style.background='transparent';face.style.border='2px solid '+bg;face.style.backdropFilter='none';break;
            }
            face.style.color=text;
            document.getElementById('cardNameDisplay').style.color=text;
            document.getElementById('cardTitleDisplay').style.color=accent;
            document.getElementById('cardLogo').style.background=accent;
            document.getElementById('cardLogo').style.color=bg;

            // Color text sync
            document.getElementById('bgColorText').value=bg;
            document.getElementById('textColorText').value=text;
            document.getElementById('accentColorText').value=accent;

            // Update QR
            const url=document.getElementById('cardUrl').value;
            if(url&&showQR){
                const img=document.getElementById('qrImage');
                img.src='https://api.qrserver.com/v1/create-qr-code/?size=120x120&data='+encodeURIComponent(url)+'&bgcolor=ffffff&color=000000';
            }
        }

        function hexToRgb(h){
            h=h.replace('#','');
            return parseInt(h.substring(0,2),16)+','+parseInt(h.substring(2,4),16)+','+parseInt(h.substring(4,6),16);
        }

        function adjustColor(hex,amt){
            const r=Math.min(255,Math.max(0,parseInt(hex.substring(1,3),16)+amt));
            const g=Math.min(255,Math.max(0,parseInt(hex.substring(3,5),16)+amt));
            const b=Math.min(255,Math.max(0,parseInt(hex.substring(5,7),16)+amt));
            return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
        }

        function resetCard(){
            document.getElementById('cardName').value='Votre Nom';
            document.getElementById('cardTitle').value='Titre / Poste';
            document.getElementById('cardInitials').value='VN';
            document.getElementById('bgColor').value='#6366f1';
            document.getElementById('textColor').value='#ffffff';
            document.getElementById('accentColor').value='#c4b5fd';
            document.getElementById('cardStyle').value='gradient';
            document.getElementById('cardFont').value="'Inter',sans-serif";
            document.getElementById('cardPhone').value='+225 01 02 03 04';
            document.getElementById('cardEmail').value='contact@exemple.com';
            document.getElementById('cardUrl').value='flay.ci/p/votreprofil';
            document.getElementById('togglePhone').classList.add('on');
            document.getElementById('toggleEmail').classList.add('on');
            document.getElementById('toggleQR').classList.add('on');
            document.getElementById('toggleLogo').classList.add('on');
            updateCard();
        }

        async function saveCard(){
            const data={
                name:document.getElementById('cardName').value,
                title:document.getElementById('cardTitle').value,
                initials:document.getElementById('cardInitials').value,
                bgColor:document.getElementById('bgColor').value,
                textColor:document.getElementById('textColor').value,
                accentColor:document.getElementById('accentColor').value,
                style:document.getElementById('cardStyle').value,
                font:document.getElementById('cardFont').value,
                phone:document.getElementById('cardPhone').value,
                email:document.getElementById('cardEmail').value,
                url:document.getElementById('cardUrl').value
            };
            try{
                const r=await fetch('/api/profile',{
                    method:'PUT',
                    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
                    body:JSON.stringify({businessCard:data})
                });
                if(r.ok)showToast('&#10003; Carte sauvegardee !');
                else showToast('Erreur lors de la sauvegarde');
            }catch(e){showToast('Erreur de connexion')}
        }

        async function loadProfile(){
            try{
                const user=JSON.parse(localStorage.getItem('flay_user')||'{}');
                if(user.username){
                    const r=await fetch('/api/profile/'+user.username,{headers:{'Authorization':'Bearer '+token}});
                    if(r.ok){
                        const d=await r.json();
                        const p=d.profile;
                        if(p.name)document.getElementById('cardName').value=p.name;
                        if(p.title)document.getElementById('cardTitle').value=p.title;
                        if(p.phone)document.getElementById('cardPhone').value=p.phone;
                        if(p.email)document.getElementById('cardEmail').value=p.email;
                        if(p.businessCard){
                            const bc=p.businessCard;
                            if(bc.initials)document.getElementById('cardInitials').value=bc.initials;
                            if(bc.bgColor)document.getElementById('bgColor').value=bc.bgColor;
                            if(bc.textColor)document.getElementById('textColor').value=bc.textColor;
                            if(bc.accentColor)document.getElementById('accentColor').value=bc.accentColor;
                            if(bc.style)document.getElementById('cardStyle').value=bc.style;
                            if(bc.font)document.getElementById('cardFont').value=bc.font;
                        }
                    }
                    document.getElementById('cardUrl').value=window.location.origin+'/p/'+user.username;
                }
                updateCard();
            }catch(e){updateCard()}
        }

        loadProfile();
    </script>
</body>
</html>
