name: Flay CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: npm ci --only=production
      
      - name: Verify modules load
        run: |
          node -e "
          const mods = ['config','auth-utils','ai-agent','chat-engine','webhooks','analytics-engine','ab-testing','business-card','design-studio','i18n','database','omni-design','crm','invoicing','notifications','two-factor','multi-currency','social-auth','visitor-tracker','cookie-consent','email-system','sms-system','team-manager','domain-manager','security','seo','db','validator','middleware','websocket','response'];
          let ok=0;
          mods.forEach(m => { try { require('./'+m); ok++; } catch(e) { console.error('FAIL:', m, e.message); process.exit(1); } });
          console.log('All ' + ok + ' modules loaded successfully');
          "
      
      - name: Verify pages exist
        run: |
          node -e "
          const fs = require('fs');
          const pages = ['index','login','register','forgot-password','reset-password','dashboard','editor','studio','payment','analytics','visitors','crm','settings','admin','reservations','user','404'];
          const missing = pages.filter(p => !fs.existsSync('./public/' + p + '.html'));
          if (missing.length) { console.error('Missing pages:', missing); process.exit(1); }
          console.log('All ' + pages.length + ' pages verified');
          "
      
      - name: Verify server starts
        run: |
          timeout 10 node server.js &
          sleep 5
          curl -f http://localhost:4000/api/health || exit 1
          echo "Server health check passed"
          kill %1 2>/dev/null

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE }}
